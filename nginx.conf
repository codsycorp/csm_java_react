    # Khối server này chỉ lắng nghe HTTPS (port 443) và xử lý proxy
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/phanmemmottrieu.net-0002/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/phanmemmottrieu.net-0002/privkey.pem; # managed by Certbot
		include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
		ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

        # $hostname because we do not want the machine's hostname to be treated as a service subdomain
        #   (e.g. $hostname is cpanel.example.com)
        # 127.0.0.1 and localhost so that those are handled consistently like $hostname
        server_name www.phanmemmottrieu.net api.phanmemmottrieu.net www.csmbridge.net api.csmbridge.net  www.tanphuice.com tanphuice.com www.nuocdatanphu.com nuocdatanphu.com h-holding.vn www.h-holding.vn h-holding.com.vn www.h-holding.com.vn;
        charset utf-8;
        client_max_body_size 1024M;
        
        # ============================================================================
        # 301 REDIRECT: .shtml → Clean URLs (SEO-friendly migration)
        # ============================================================================
        # Pattern: /slug.shtml → /slug
        # Pattern: /category/slug.shtml → /category/slug
        # With query params preserved: ?page=2 → ?page=2
        
        # Index pages: /slug.shtml → /slug
        # EXCEPT: giữ nguyên các endpoint .shtml đặc biệt cho backend
        location = /images.shtml {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 16 64k;
            proxy_busy_buffers_size 128k;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location = /upload.shtml {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 16 64k;
            proxy_busy_buffers_size 128k;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # ✅ CORS HEADERS for upload endpoint (Zalo webview)
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, PUT, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            
            # ✅ Handle OPTIONS (preflight) requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, PUT, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Length' 0 always;
                add_header 'Content-Type' 'text/plain charset=utf-8' always;
                return 204;
            }
        }

        location = /page_struct_js.shtml {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 16 64k;
            proxy_busy_buffers_size 128k;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location ~ ^/([a-z0-9\-]+)\.shtml$ {
            set $clean_slug $1;
            return 301 /$clean_slug$is_args$args;
        }

        # Detail pages: /category/slug.shtml → /category/slug
        location ~ ^/([a-z0-9\-]+)/([a-z0-9\-]+)\.shtml$ {
            set $category $1;
            set $item_slug $2;
            return 301 /$category/$item_slug$is_args$args;
        }

        # Fallback: Any other .shtml URLs
        location ~ ^(.+)\.shtml$ {
            set $clean_url $1;
            return 301 $clean_url$is_args$args;
        }
        
        # Cache static resources
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            root /root/la_server/csm_datas/public;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri @backend;
        }
        
        location @backend {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 16 64k;
            proxy_busy_buffers_size 128k;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # High-volume table reads: disable proxy buffering/cache so large JSON streams
        # are forwarded progressively instead of being held in memory/temp files.
        location = /get-table-data {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_request_buffering off;
            proxy_buffering off;
            proxy_cache off;
            proxy_no_cache 1;
            proxy_cache_bypass 1;

            gzip off;
            chunked_transfer_encoding on;

            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            send_timeout 600s;

            add_header X-Accel-Buffering no always;
            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate, no-transform" always;
            add_header X-Cache-Status BYPASS always;
        }

        location = /api/get-table-data {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_request_buffering off;
            proxy_buffering off;
            proxy_cache off;
            proxy_no_cache 1;
            proxy_cache_bypass 1;

            gzip off;
            chunked_transfer_encoding on;

            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            send_timeout 600s;

            add_header X-Accel-Buffering no always;
            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate, no-transform" always;
            add_header X-Cache-Status BYPASS always;
        }
        
        location / {
            # Proxy pass-through: để backend xử lý CORS/OPTIONS hoàn toàn
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
            proxy_set_header Connection "";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Origin $http_origin;
            
            # 📤 LARGE REQUEST SUPPORT - No size limit
            proxy_request_buffering on;
            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 32 256k;
            proxy_busy_buffers_size 512k;
            proxy_max_temp_file_size 2048m;
            proxy_temp_file_write_size 512k;
            
            # Timeouts (tăng cho AI requests + large uploads)
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Cache cho API responses (tuỳ chỉnh theo nhu cầu)
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_bypass $cookie_nocache $arg_nocache $http_authorization;
            proxy_no_cache $http_authorization;
            add_header X-Cache-Status $upstream_cache_status;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
