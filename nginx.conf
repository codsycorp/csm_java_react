    # Khối server này chỉ lắng nghe HTTPS (port 443) và xử lý PHP
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name  kqxs.phanmemmottrieu.net kqxs.csmbridge.net;
        charset utf-8;
        client_max_body_size 1024M;
        root         /root/la_php_server/kqxs;
        index index.html index.php;
        # Tăng timeout cho long-running requests
        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # ⚠️ BẤT CẤP CACHE - Luôn lấy dữ liệu mới nhất (không nhớ cache)
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0, public";
        add_header Pragma "no-cache";
        add_header Expires "0";

    ssl_certificate /etc/letsencrypt/live/phanmemmottrieu.net-0002/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/phanmemmottrieu.net-0002/privkey.pem; # managed by Certbot
		include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
		ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

        # Load configuration files for the default server block.
        include snippets/fastcgi-php.conf;
        rewrite ^/(.*)\.shtml$ /main.php?$1 last;
        location / {
            # try_files $uri /index.php$is_args$args; # <-- BỎ DÒNG NÀY HOẶC CHỈNH SỬA
            try_files $uri $uri/ /index.php?$args; # <-- THAY THẾ BẰNG DÒNG NÀY
            
            # Không cache cho request động
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
        }
        location ~ \.php$ {

            fastcgi_connect_timeout 60;
            fastcgi_send_timeout 180;
            fastcgi_read_timeout 180;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
            fastcgi_max_temp_file_size 0;
			# With php-fpm (or other unix sockets):
			fastcgi_pass unix:/var/run/php/php5.6-fpm.sock;
            # fastcgi_pass   127.0.0.1:9000;
            #fastcgi_read_timeout 200;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            
            # Không cache cho PHP files
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
        }
        location ~* \.(eot|ttf|woff|woff2|docx)$ {
            add_header Access-Control-Allow-Origin *;
        }

        # API endpoints - Luôn lấy dữ liệu mới nhất
        location ~ ^/api/ {
            # Không cache API requests
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
        }

        # Tương tự cho JSON, AJAX requests và động content
        location ~ \.(json|xml)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
        }
    

}
