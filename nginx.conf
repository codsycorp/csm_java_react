        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name viranova-prototype.site www.viranova-prototype.site;
    ssl_certificate /etc/letsencrypt/live/phanmemmottrieu.net-0002/fullchain.pem; # managed by Certbot
