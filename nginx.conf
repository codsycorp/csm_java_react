    # ============================================================================
    # static.phanmemmottrieu.net – Static file CDN server
    # CORS allowed: www.csmbridge.net, www.phanmemmottrieu.net,
    #               www.h-holding.vn, www.h-holding.com.vn
    # ============================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name static.phanmemmottrieu.net;

        ssl_certificate /etc/letsencrypt/live/phanmemmottrieu.net-0002/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/phanmemmottrieu.net-0002/privkey.pem; # managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

        root /root/la_server/csm_datas/public;
        charset utf-8;
        autoindex off;

        # Block dotfiles
        location ~ /\. {
            deny all;
        }

        # Serve static files with CORS
        location / {
            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;

            try_files $uri =404;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }

