user www-data;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {

    # Include file chặn IP ở đầu khối http
    include /etc/nginx/blocked_ips.conf;
    
    # ✅ CORS Origin: 
    # - Nếu có Authorization header → cho phép TẤT CẢ origins
    # - Không có → chỉ cho phép known domains
    map $http_authorization $cors_origin_auth {
        default "";
        "~Bearer .+" $http_origin;
        "~csm-token .+" $http_origin;
    }
    
    map $http_authorization $allow_all_origins {
        default 0;
        "~Bearer .+" 1;
        "~csm-token .+" 1;
    }
    
    map $http_origin $cors_origin_public {
        default "";
        "~^https?://(www\.)?(phanmemmottrieu\.net|csmbridge\.net|h-holding\.vn|h-holding\.com\.vn)" $http_origin;
        "~^https?://.*\.(phanmemmottrieu\.net|csmbridge\.net)" $http_origin;
        "~^http://localhost(:[0-9]+)?$" $http_origin;
        "~^http://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
    }
    
    # ✅ Final CORS origin: dùng auth nếu có, không thì dùng whitelist
    map $allow_all_origins $cors_origin {
        0 $cors_origin_public;
        1 $http_origin;
    }
    
    # ✅ Map phải đặt trong đây
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
	##
	# Basic Settings - Optimized for 10k concurrent users
	##

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	keepalive_requests 100;
	reset_timedout_connection on;
	send_timeout 300;
	types_hash_max_size 2048;
	
	# ⚡ UNLIMITED REQUEST SIZE - Cho phép client gửi nội dung dài (AI content)
	client_max_body_size 0;  # 0 = không giới hạn
	client_body_buffer_size 5m;  # Buffer lớn hơn để xử lý nhanh
	client_body_timeout 300;  # Timeout dài hơn cho request lớn
	client_header_timeout 60;
	client_header_buffer_size 4k;
	large_client_header_buffers 8 32k;  # Header buffer lớn hơn
	server_tokens off;
	
	# Proxy buffers cho backend - Tăng để xử lý response lớn
	proxy_buffer_size 16k;
	proxy_buffers 8 32k;
	proxy_busy_buffers_size 64k;
	
	# Connection pooling tới backend
	upstream backend_pool {
		server 127.0.0.1:9999 max_fails=3 fail_timeout=30s;
		keepalive 64;
		keepalive_requests 100;
		keepalive_timeout 60s;
	}

	server_names_hash_bucket_size 128;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings - ENABLED for performance
	##

	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 5;
	gzip_buffers 16 8k;
	gzip_http_version 1.1;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/x-font-ttf font/opentype application/vnd.ms-fontobject;
	gzip_min_length 256;
	gzip_disable "msie6";

	# Brotli compression (nếu module có sẵn)
	# brotli on;
	# brotli_comp_level 6;
	# brotli_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript image/svg+xml;

	##
	# Proxy Cache Settings
	##
	proxy_cache_path /var/cache/nginx/proxy levels=1:2 keys_zone=api_cache:100m max_size=1g inactive=60m use_temp_path=off;
	proxy_cache_key "$scheme$request_method$host$request_uri";
	proxy_cache_valid 200 304 10m;
	proxy_cache_valid 404 1m;
	proxy_cache_bypass $http_pragma $http_authorization;
	proxy_no_cache $http_pragma $http_authorization;

	##
	# Open File Cache
	##
	open_file_cache max=10000 inactive=30s;
	open_file_cache_valid 60s;
	open_file_cache_min_uses 2;
	open_file_cache_errors on;

	##
	# Virtual Host Configs
	##
