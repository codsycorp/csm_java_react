                var _keyStr = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=";
                var _utf8_encode = function (string) {
                  var utftext = "", c, n;
                  string = string.replace(new RegExp('\r\n', 'g'),"\n");
                  for (n = 0; n < string.length; n++) {
                    c = string.charCodeAt(n);

                      string += String.fromCharCode(c);
                      i++;
                    }
                    else if((c > 191) && (c < 224)) {

                var _hexDecode = function(input) {
                  var output = '', i;
                  if(input.length % 2 > 0) {
                    input = '0' + input;
                  }
                  for(i = 0; i < input.length; i = i + 2) {
                    output += String.fromCharCode(parseInt(input.charAt(i) + input.charAt(i + 1), 16));
                  }
                  return output;
                };
                var encode = function (input) {
                  var output = "", chr1, chr2, chr3, enc1, enc2, enc3, enc4, i = 0;
                  input = _utf8_encode(input);
                  while (i < input.length) {
                    chr1 = input.charCodeAt(i++);
                    chr2 = input.charCodeAt(i++);
                    chr3 = input.charCodeAt(i++);
                    enc1 = chr1 >> 2;

                    enc2 = _keyStr.indexOf(input.charAt(i++));
                    enc3 = _keyStr.indexOf(input.charAt(i++));

                    output += String.fromCharCode(chr1);
                    if (enc3 !== 64) {

                    }
                    if (enc4 !== 64) {
                      output += String.fromCharCode(chr3);
                    }

            strtr:function(str, from, to) {
              var fr = '',
                  i = 0,
                  j = 0,
                  lenStr = 0,
                  lenFrom = 0,
                  tmpStrictForIn = false,
                  fromTypeStr = '',
                  toTypeStr = '',
                  istr = '';
              var tmpFrom = [];
              var tmpTo = [];
              var ret = '';
              var match = false;
              // Received replace_pairs?
              // Convert to normal from->to chars
              if (typeof from === 'object') {
                // Not thread-safe; temporarily set to true
                tmpStrictForIn = this.ini_set('phpjs.strictForIn', false);
                from = this.krsort(from);
                this.ini_set('phpjs.strictForIn', tmpStrictForIn);
                for (fr in from) {
                  if (from.hasOwnProperty(fr)) {
                    tmpFrom.push(fr);
                    tmpTo.push(from[fr]);
                  }
                }
                from = tmpFrom;
                to = tmpTo;
              }
              // Walk through subject and replace chars when needed
              lenStr = str.length;
              lenFrom = from.length;
              fromTypeStr = typeof from === 'string';
              toTypeStr = typeof to === 'string';
              for (i = 0; i < lenStr; i++) {
                match = false;
                if (fromTypeStr) {
                  istr = str.charAt(i);
                  for (j = 0; j < lenFrom; j++) {
                    if (istr == from.charAt(j)) {
                      match = true;
                      break;
                    }
                  }
                }
                else {
                  for (j = 0; j < lenFrom; j++) {
                    if (str.substr(i, from[j].length) == from[j]) {
                      match = true;
                      // Fast forward
                      i = (i + from[j].length) - 1;
                      break;
                    }
                  }
                }
                if (match) {
                  ret += toTypeStr ? to.charAt(j) : to[j];
                }
                else {
                  ret += str.charAt(i);
                }
              }
              return ret;
            },

                this.marked.push(this.editor.markText(cursor.from(), cursor.to(), "searched"));

              var cursor = this.editor.getSearchCursor(text, this.lastPos || this.editor.getCursor());

                cursor = this.editor.getSearchCursor(text);

              this.editor.setSelection(cursor.from(), cursor.to());
              this.lastQuery = text;
              this.lastPos = cursor.to();

            CheckRouterName:function(strCode)
            {
              var r_name=false;
              var truong_tim=strCode.match(/\/\*\*\*\*\*\((.*?)\)\*\*\*\*\*\//g);
              if(truong_tim!=null)
                for(const [key,value] of Object.entries( truong_tim ) )
                  r_name=value.replace('/*****(',"").replace(')*****/',"");

                if(r_name.indexOf(".")!==-1)
                  r_name=false;
              return r_name;

            CheckRouterPops:function(strCode)
            {
              var r_name=false;
              var truong_tim=strCode.match(/\/\*\*\*\((.*?)\)\*\*\*\//g);
              if(truong_tim!=null)
                for(const [key,value] of Object.entries( truong_tim ) )
                  r_name=value.replace('/***(',"").replace(')***/',"");

            findLevel_Component:function(V_Codes,strComCode,arrLevelCom,lvl,isVue)
            {
              if(isVue)
              {
                lvl++;
                that=this;
                var findCom=strComCode.replace(/\n/g,"").replace(/ /g,"").match(/components:\{(.*?)\}/g);
                if(findCom)
                  if(findCom.length>0)
                  {
                    var strCom=[];
                    strCom=findCom[0].replace("components:{","").replace("}","").split(/\,/g).filter((o)=>o!=="");
                    strCom.forEach(function(v){
                      var aCom=v.split(":");
                      if(aCom.length===2)
                      {
                        var comV=V_Codes.find(function(c){
                          return c.id.toLowerCase()===aCom[1].toLowerCase()});
                        if(comV)
                        {
                          var idx=arrLevelCom.findIndex(function(c){
                            return c.id.toLowerCase()===aCom[1].toLowerCase()});
                          if(idx!==-1)
                            arrLevelCom[idx]=Object.assign({
                              lvl:arrLevelCom[idx].lvl+1},comV);
                          else
                            arrLevelCom.push(Object.assign({lvl:1},comV));
                          arrLevelCom=that.findLevel_Component(V_Codes,comV.p_code,arrLevelCom,lvl,isVue);
                        }
                      }
                    });
                  }
              }
              else
              {
                V_Codes.forEach(function(v){
                  if(strComCode.match(new RegExp('<'+v.id,'g'))||strComCode.match(new RegExp('{'+v.id,'g')))
                  {
                    var idx=arrLevelCom.findIndex(c=>c.id===v.id);
                    if(idx!==-1)
                      arrLevelCom[idx]=Object.assign({
                        lvl:arrLevelCom[idx].lvl+1},v);
                    else
                      arrLevelCom.push(Object.assign({
                        lvl:1},v));
                    arrLevelCom=that.findLevel_Component(V_Codes,v.p_code,arrLevelCom,lvl,isVue);
                  }
                });
              }
              return arrLevelCom;

            createStructVuejs:function(app_token,app_token_base)
            {
              var that=this;
              var objDB=that.sources.filter(function(p){
                return p.p_type===0&&(p.id.toLowerCase().startsWith(app_token.toLowerCase()+'_')||p.id.toLowerCase()===app_token.toLowerCase());
              });
              objDB=JSON.parse(JSON.stringify(objDB));
              var C_Codes=[],R_Codes=[],arrLevelCom=[],strCode;
              var routerV=[],MainPage='';
              var jsCodeIndex=objDB.find(function(p){
                return p.id.toLowerCase()===app_token.toLowerCase();
              });
              if(jsCodeIndex)
                jsCodeIndex=that.la_decrypt(jsCodeIndex.p_code);
              objDB.filter(function(p){
                return p.id.toLowerCase()!==app_token.toLowerCase();
              }).forEach((comp) => {
                var component_code=that.la_decrypt(comp.p_code);
                comp.p_code=component_code;
                var r_name=that.CheckRouterName(component_code);
                if(r_name && !R_Codes.find(c=>c.id===comp.id))
                {
                  if(r_name.toLowerCase()==="login")
                    MainPage=component_code;
                  if(r_name.toLowerCase()==="main")
                  {
                    MainPage=component_code;
                    routerV.push({path: '*',name: "main",component:component_code,id:comp.id.toLowerCase(), props: true, props: true});
                  }
                  else if(r_name.toLowerCase()==="home")
                      routerV.push({path: '',name: "home",component:component_code,id:comp.id.toLowerCase(), props: true, props: true});
                  else
                      routerV.push({path: '/'+r_name.toLowerCase(),name: r_name.toLowerCase(), component:component_code,id:comp.id.toLowerCase(), props: true}); 
                  R_Codes.push(comp);
                }
                else if(!C_Codes.find(c=>c.id===comp.id))
                  C_Codes.push(comp);
              });
              var A_Code=R_Codes.concat(C_Codes);
              A_Code.forEach((comp) => {
                arrLevelCom=that.findLevel_Component(A_Code,comp.p_code,arrLevelCom,0,true);

                // console.log(strVCom);
                var obfuscationResult = JavaScriptObfuscator.obfuscate(strVCom);
                strVCom=that.Base64.encode(obfuscationResult.getObfuscatedCode());
                var idStruct="web";
                if(app_token.toLowerCase()!==app_token_base.toLowerCase())
                  idStruct="app";
                // console.log(app_token_base,idStruct)
                that.la_obj_tables({app_id:app_token_base.toLowerCase(),obj_name:"index",e_where:{id:idStruct}},function(msgF){
                    var cmd="create";
                    if(msgF.rows.length>0)
                      cmd="update";
                    // console.log(msgF);
                    that.la_obj_updates({app_id:app_token_base.toLowerCase(),obj_name:"index",command:cmd,obj_update:{id:idStruct,struct:strVCom},e_where:{id:idStruct}},function(msg){
                      if(msg.status)

                        if(msg.command==="create")
                          that.thongbao("Đã thêm xong");
                        else if(msg.command==="update")
                          that.thongbao("Đã lưu thành công");
                      }
                    });
                });
              }
            },
