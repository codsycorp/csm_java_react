<script type="text/javascript">
	var donght=0,cotht=0;
	function btn_click(id,doi_mau)
	{
		switch(id) {
			case "L":
				var loai=($("#L").text()=="L"?"L":"B");
				check(id,"tbl1",'badge badge-danger',loai,doi_mau);
				break;
			case "LHBP":
				if($("#LHBP").text()=="LH")
				{
					$("#LHBP").text("BP");
					$("#H").text("H");
					$("#L").text("L");
				}
				else
				{
					$("#LHBP").text("LH");
					$("#L").text("B");
					$("#H").text("P");
				}
				createCookie("LHBP",$("#LHBP").text(),1);
				location.href=location.href;
		        break;
			case "T":
		        check(id,"tbl1",'badge badge-success','T',doi_mau);
		        break;
			case "H":
				var loai=($("#H").text()=="H"?"H":"P");
				check(id,"tbl1",'badge badge-info',loai,doi_mau);
				break;
		    default:
		        Xoacheck("tbl1");
		}	
	}
	function TaoBang(idtable,so_dong,so_cot,dai_cot,cao_dong)
	{
		var table = document.getElementById(idtable);
		table.style.height=(so_dong*cao_dong)+"px";
		table.style.width=(so_cot*dai_cot)+"px";
		for(var d=0; d<so_dong; d++)
		{
	        var row = table.insertRow(d);
	        for(var c=0; c<so_cot; c++)
		    {
		        var cell1 = row.insertCell(c);
		        cell1.setAttribute('style',"height:"+cao_dong+"px");
		        var cells = row.getElementsByTagName('td');
		        cells[c].setAttribute('id',idtable+"_"+d+"_"+c);
		        cells[c].setAttribute('style',"width:"+dai_cot+"px;position: relative;");
		        if(idtable=="tbl3")
			        bang_x[d+"_"+c]="";
			    if(idtable=="tbl4")
			        bang_dulieu[d+"_"+c]="";
			}
	    }
	}
	var bang_x={};	
	var bang_dulieu={};	
	var bang_dulieu_rong={};	
	var bang_dulieu_dac={};
	var bang_dulieu_phaymua={};
	TaoBang('tbl1',6,72,30,30);
	TaoBang('tbl2',6,72,30,30);
	TaoBang('tbl3',6,72,25,25);
	TaoBang('tbl4',6,72,30,30);
	TaoBang('tbl5',6,72,30,30);
	TaoBang('tbl6',6,72,25,25);
	
	var mang_giatri =new Array();	
	var mang_diem =new Array();
	var mang_doi =new Array();	
	var mang_x =new Array();
	
	var lan_enter=0;
	var lenh="";
	var lenh_luu_tru=new Array();
	function xoaNho()
	{
		createCookie("lenh",null,1);
		createCookie("LHBP",null,1);	
		location.href=location.href;	
	}
	$( document ).ready(function() {
		labai("","",true);
		if(readCookie("LHBP")!=null)
		{
			if(readCookie("LHBP")=="BP")
			{					
				$("#H").text("H");
				$("#L").text("L");
			}
			else
			{
				$("#H").text("P");
				$("#L").text("B");
			}
			$("#LHBP").text(readCookie("LHBP"));
		}
		if(readCookie("lenh")!=null)
		{
			var chay_lai_lenh=readCookie("lenh");
			for(var c=0;c<chay_lai_lenh.length;c++)
				LenhGoi(chay_lai_lenh[c],false);
		}
	});
	function LenhGoi(lenh,luu)
	{
		var lenh1=lenh;
		if(lenh1.indexOf("++")!=-1)
    	{

			console.log(lenh1);
    		var la=lenh1.split("++");
    		if(1*la[1]<=4&&1*la[1]>0)
				labai(la[0],la[1],false);
			else
				labai("","",true);
				lenh_luu_tru[lenh_luu_tru.length]=lenh1;	
			if(luu==true)
	    	{
				createCookie("lenh",lenh_luu_tru,1);
	    	}
	    	return;
    	}
    	var thaotac=lenh1.split('+');
		if((1*thaotac[1]>0&&1*thaotac[1]<10)&&(1*thaotac[0]>0&&1*thaotac[0]<4))
				mang_diem[mang_giatri.length]=thaotac[1];
		else
		{
			lenh="";
			lan_enter=0;
			return;	
		}
		mang_doi[mang_doi.length]=0;
		if(thaotac.length>2)
    		if(1*thaotac[2]>3&&1*thaotac[2]<7)
				mang_doi[mang_doi.length]=thaotac[2];
		switch(thaotac[0])
    	{
    		case "1":
				btn_click('L',thaotac[2]);
        		break;//1.B(1-13) quan bai + (1->4)chat = La bai
        	case "2":
				btn_click('T',thaotac[2]);
        		break;//2.T
        	case "3":
				btn_click('H',thaotac[2]);
        		break;//3.P
    		case "":break;//1 B(Do)+so=do so
    		case "":break;//1 P(Do)+so=Xanh so
    	}
    	lenh_luu_tru[lenh_luu_tru.length]=lenh1;
    	if(luu==true)
    	{
			createCookie("lenh",lenh_luu_tru,1);
    	}
	}
	$(document).keydown(function(e) {
		e = e || event;
	    if(e.keyCode == 0||e.keyCode == 13) {
	    	// console.log(lenh.split("+").length);
	        if(lenh.split("+").length>=2)
	        {
	        	// console.log(lenh);
	        	LenhGoi(lenh,true);
	        	lan_enter=0;
	        	lenh="";
	        }
	        if(lenh.length>5)
	    	{
	    		lenh="";
	    	}
	        return true;
	    }
