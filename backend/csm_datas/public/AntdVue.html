    function TạoIndexTimKiemChoBang(app_id,obj_name){
      var payload = {
        app_id: app_id,
        obj_name: obj_name,
      };
      fetch(domain_api_url+"/update-table-data-index", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      })
        .then(response => response.json())
        .then(data => {
          console.log("✅ Kết quả:", data);
        })
        .catch(error => {
          console.error("❌ Lỗi:", error);
        });
    }
    // Khai báo CustomStore
    // Lưu cursor tương ứng với từng trang
    window.cursorMap = {
      0: null // Trang 0 không cần cursor
    };

    var dataGrd = new DevExpress.data.CustomStore({
      key: "id",
      loadMode: "processed", // server xử lý phân trang
      load: function(loadOptions) {
        const take = loadOptions.take || 50;
        const pageIndex = (loadOptions.skip || 0) / take;

        // Lấy cursor tương ứng với trang hiện tại
        const cursor = window.cursorMap[pageIndex] || null;

        // const params = {
        //   app_id: "fidovnemail",
        //   obj_name: "fid_doanhnghiep",
        //   e_where: {
        //     operator: "AND",
        //     conditions: []
        //   },
        //   take: take,
        //   lastkey: cursor
        // };
        const params = {
          app_id: "fidovnemail",
          obj_name: "fid_doanhnghiep",
          e_where: {
            operator: "AND",
            conditions: [
              {
                field: "company_name",
                type: "like",
                value: "du lịch"
              }
            ]
          },
          take: take,
          lastkey: cursor
        };
        return new Promise((resolve, reject) => {
          la_obj_tables(params, function(rs) {
            if (rs && Array.isArray(rs.rows)) {
              // Lưu nextCursor cho trang kế tiếp
              window.cursorMap[pageIndex + 1] = rs.nextCursor;

              resolve({
                data: rs.rows,
                totalCount: rs.totalCount // bạn đã có từ backend
              });
            } else {
              reject("Lỗi dữ liệu từ backend");
            }
          });
        });
      }
    });

    $("#scheduler").dxDataGrid({
      dataSource: dataGrd,
      key: "id",
      height: 600,
      columns: [
        { dataField: "id", caption: "ID" },
        { dataField: "company_name", caption: "Tên Công Ty" },
        { dataField: "tax_code", caption: "MST" },
        { dataField: "phone_number", caption: "Điện Thoại" },
        { dataField: "email", caption: "Email" }
      ],
      paging: {
        enabled: true,
        pageSize: 50
      },
      pager: {
        visible: true,
        showPageSizeSelector: true,
        allowedPageSizes: [50, 100, 200],
        showInfo: true,
        showNavigationButtons: true,
        infoText: 'Trang {0} / {1} (Tổng: {2} dòng)'
      },
      remoteOperations: {
        paging: true,
        filtering: true,
        sorting: true
      },
      onContentReady: function(e) {
        const grid = e.component;
        const totalCount = grid.totalCount();

        if (!document.getElementById("custom-total-footer")) {
          const footer = document.createElement("div");
          footer.id = "custom-total-footer";
          footer.style.padding = "10px";
          footer.style.textAlign = "right";
          footer.innerText = `Tổng số bản ghi: ${totalCount.toLocaleString()}`;
          grid.element().append(footer);
        }
      }
    });
