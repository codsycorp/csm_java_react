# ⚡ OPTIMIZED FOR 10K CONCURRENT USERS
# Strategy: Many connections + few threads + async I/O + keep-alive
# - Max threads: 200 (không quá nhiều để tránh context switching)
# - Max connections: 10000 (NIO cho phép 10k connections với ít threads)
# - Keep-alive: Tái sử dụng connections, giảm overhead
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=200
server.tomcat.max-connections=3000
server.tomcat.connection-timeout=180000
server.tomcat.keep-alive-timeout=30000
server.tomcat.max-keep-alive-requests=200
server.tomcat.processor-cache=100

# Auth API rate limiting (per workstation/client key)
# Applies to login/register/refresh endpoints in RateLimitingFilter
security.auth-rate-limit.max-requests-per-minute=120
security.auth-rate-limit.window-ms=60000
security.auth-rate-limit.cleanup-interval-ms=60000
security.auth-rate-limit.tracker-ttl-ms=600000

# ⚡ UNLIMITED REQUEST SIZE - Cho phép client gửi nội dung dài không giới hạn
# -1 = unlimited, đặc biệt hữu ích cho AI content generation với nội dung dài
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-parameter-count=-1
server.tomcat.max-http-header-size=1MB
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true

# Response compression for Google PageSpeed
server.compression.enabled=true
server.compression.mime-types=text/html,text/plain,text/xml,application/json,application/javascript,text/css,image/svg+xml,application/xml
server.compression.min-response-size=1024

# Connection & Performance Settings
server.connection-timeout=180000
server.http2.enabled=true
spring.main.web-application-type=servlet
spring.main.lazy-initialization=false
spring.main.allow-bean-definition-overriding=false
# Spring Boot 3+: use profile groups instead of spring.profiles.include inside profile-specific files
spring.profiles.group.prod=performance
server.port=15300

# 🔴 HikariCP Connection Pool - Optimized for RocksDB embedded DB
# RocksDB không cần nhiều connections, chủ yếu cho Lucene + metadata
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=CSM-HikariPool
spring.datasource.hikari.register-mbeans=false

# Redis Configuration for distributed caching - Optimized for 10k users
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=3000
spring.redis.lettuce.pool.max-active=50
spring.redis.lettuce.pool.max-idle=20
spring.redis.lettuce.pool.min-idle=5
spring.redis.lettuce.pool.max-wait=3000ms
spring.redis.lettuce.shutdown-timeout=200ms

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false
spring.cache.cache-names=apiCache,pageCache,dataCache
spring.main.lazy-initialization=true
socket.server.port=15301
socket.server.host=0.0.0.0
ml.config.external-path=./ml_configs_runtime
# Đường dẫn gốc chung cho tất cả dữ liệu của ứng dụng
app.data.dir=./csm_datas

# Đường dẫn gốc cho tất cả các RocksDB databases
# Sử dụng @{app.data.dir} để tham chiếu đến thư mục gốc chung
rocksdb.root.dir=${app.data.dir}/database

# Đường dẫn gốc cho tất cả các thư mục backup của RocksDB
rocksdb.backup.dir=${app.data.dir}/backups

# Đường dẫn gốc cho tất cả các Lucene indexes
lucene.index.root.dir=${app.data.dir}/lucene_index

ai.code-stream.sse-timeout-ms=0
# Adaptive SSE timeout (server-capacity aware). If base timeout is 0 (infinite), adaptive is bypassed.
ai.code-stream.sse-timeout.adaptive.enabled=true
ai.code-stream.sse-timeout.adaptive.min-ms=120000
ai.code-stream.sse-timeout.adaptive.max-ms=3600000
ai.code-stream.sse-timeout.adaptive.message-char-ms=20
ai.code-stream.sse-timeout.adaptive.code-char-ms=3
ai.code-stream.sse-timeout.adaptive.cores-baseline=8
ai.code-stream.sse-timeout.adaptive.memory-gb-baseline=16
ai.code-stream.sse-timeout.adaptive.weak-server-cores-threshold=2
ai.code-stream.sse-timeout.adaptive.weak-server-memory-gb-threshold=6
ai.code-stream.sse-timeout.adaptive.weak-server-force-infinite=true
ai.code-stream.sse-timeout.adaptive.safety-multiplier=1.2
ai.code-stream.max-prompt-chars=140000
# Dedicated budget for menu_json flow to reduce truncation on large menu trees.
ai.code-stream.menu.max-prompt-chars=220000
# When menu context is very large, build representative chunks before model call.
ai.code-stream.menu.chunked-context.enabled=true
ai.code-stream.menu.chunked-context-threshold-chars=120000
ai.code-stream.menu.chunked-context-max-chars=110000
ai.code-stream.menu.shrink-guard.enabled=true
ai.code-stream.menu.shrink-guard.min-ratio=0.2
ai.code-stream.max-current-code-chars=80000
ai.code-stream.max-attachment-chars-per-file=20000
ai.code-stream.max-attachments-total-chars=60000
ai.code-stream.base-cache.enabled=true
ai.code-stream.base-cache.max-content-chars=2200000
ai.code-stream.base-cache.max-entries=24
ai.code-stream.base-cache.ttl-minutes=90
ai.code-stream.base-cache.auto-promote-chars=120000
ai.code-stream.auto-continue.enabled=false
ai.code-stream.auto-continue.max-attempts=1
ai.code-stream.auto-continue.max-previous-response-chars=120000

# ── Model Routing (Flash for simple analyze, Pro for complex edit) ───────────
# Set to lightweight model for simple analyze (or leave empty to disable routing)
ai.code-stream.routing.enabled=true
ai.code-stream.routing.simple-model=local_provider
# Route to simple model when totalChars (message + code) < this threshold AND analyze mode
ai.code-stream.routing.complex-threshold-chars=20000
ai.code-stream.routing.prefer-simple-for-edit=true
ai.code-stream.routing.edit-simple-max-chars=120000
ai.code-stream.routing.force-simple-first=true
# Do not force simple-first on very large payloads to avoid extra retry cost.
ai.code-stream.routing.simple-first-max-chars=60000
# For oversized prompts, skip simple->default retry chain and fail over directly.
ai.code-stream.routing.retry-default-max-prompt-chars=80000

# Optional local-provider-first routing for code-stream cost optimization.
ai.code-stream.local-provider.enabled=true
ai.code-stream.local-provider.analyze-only=false
ai.code-stream.local-provider.max-prompt-chars=500000
ai.code-stream.local-provider.allow-menu-json=true
ai.code-stream.local-provider.require-structured-for-edit=true

# Mandatory local pre-analysis before cloud fallback
ai.local.pre-analysis.enabled=true
ai.local.pre-analysis.max-prompt-chars=120000
ai.local.pre-analysis.max-cloud-context-chars=12000
ai.local.pre-analysis.adaptive.enabled=true
ai.local.pre-analysis.adaptive.deep-request-threshold-chars=800
ai.local.pre-analysis.adaptive.deep-prompt-threshold-chars=14000
ai.local.pre-analysis.adaptive.deep-max-prompt-chars=120000
ai.local.pre-analysis.adaptive.deep-input-token-scale=1.25
ai.local.pre-analysis.adaptive.deep-input-token-hard-cap=2400
ai.local.fast-question.enabled=true
ai.local.fast-question.max-question-chars=1600
ai.local.fast-question.max-tokens=384
# Optional: when true, force complex timeline/business-estimation questions out of fast-path.
# Keep false by default for flexible multi-domain handling and lower latency.
ai.local.fast-question.complex-estimation-block.enabled=false

# Adaptive local intent-classify tuning (step-1 routing).
# Keep these configurable instead of hardcoded so each environment can tune
# latency/accuracy without code changes.
ai.local.intent-classify.max-request-chars=400
ai.local.intent-classify.cache-ttl-ms=10000
ai.local.intent-classify.adaptive-cache-ttl-ms=1800000
ai.local.intent-classify.adaptive-cache-min-confidence=88
ai.local.intent-classify.confidence-threshold=60
ai.local.intent-classify.second-pass.enabled=true
ai.local.intent-classify.second-pass.min-request-chars=24
ai.local.intent-classify.token.min=40
ai.local.intent-classify.token.max=80
ai.local.intent-classify.token.first-pass.base=40
ai.local.intent-classify.token.second-pass.base=64
ai.local.intent-classify.token.length-step-chars=180
ai.local.intent-classify.token.length-step-increase=8
ai.local.intent-classify.token.complexity-step-increase=3
ai.local.intent-classify.token.complexity-max-bonus=16

# Model-driven routing: local AI #1 classifier owns edit vs analyze; keyword overrides disabled when enabled.
ai.local.routing.model-driven.enabled=true
ai.local.routing.model-driven.min-confidence=55

# RouterScore v2: local-only/hybrid/cloud-only decision before execution.
ai.router.score-v2.enabled=true
ai.router.score-v2.local-only-threshold=80
ai.router.score-v2.hybrid-threshold=30
ai.router.score-v2.large-payload-cloud-threshold-chars=60000
ai.router.score-v2.menu-json-cloud=false
ai.router.score-v2.edit-penalty=20
ai.router.score-v2.local-only-hard=true
ai.local.only.enabled=true

# Requirement clarification: backend auto-builds requirement contract before model execution.
ai.requirement-clarify.enabled=true
ai.requirement-clarify.max-items=6
ai.requirement-clarify.hard-guard.enabled=true
# hard-guard.mode: hard | soft | off
# - hard: block ambiguous requests and ask clarification
# - soft: never block, only log ambiguity and continue processing
# - off : disable ambiguity guard completely
ai.requirement-clarify.hard-guard.mode=soft
ai.requirement-clarify.hard-guard.edit-only=false
ai.requirement-clarify.hard-guard.menu-json.enabled=true
ai.requirement-clarify.hard-guard.code.enabled=true
ai.requirement-clarify.hard-guard.min-ambiguities=2
ai.requirement-clarify.hard-guard.max-questions=3
ai.requirement-clarify.hard-guard.menu-json.strict-target-required=false

# ── Prompt Split Gate (legacy compatibility path) ───────────────────────────
# Split prompt into stable/context part and request part when context is large
ai.code-stream.prompt-cache.min-chars=8000
# AI prompt limits for /ai-generate-seo-content
ai.prompt.max-chars=3000000
ai.async.job-ttl-ms=3600000
ai.async.poll-min-ms=3000

# Local llama.cpp JNI provider (no external service)
ai.local.llama.enabled=true
ai.local.llama.prefer-local-first=true
ai.local.llama.model-path=${AI_LOCAL_LLAMA_MODEL_PATH:./csm_datas/ai_local/model/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf}
ai.local.llama.context-window=${AI_LOCAL_LLAMA_CONTEXT_WINDOW:8192}
ai.local.llama.max-tokens=${AI_LOCAL_LLAMA_MAX_TOKENS:4096}
ai.local.llama.temperature=${AI_LOCAL_LLAMA_TEMPERATURE:0.0}
ai.local.llama.top-p=${AI_LOCAL_LLAMA_TOP_P:0.75}
ai.local.llama.top-k=${AI_LOCAL_LLAMA_TOP_K:20}
ai.local.llama.threads=${AI_LOCAL_LLAMA_THREADS:1}
ai.local.llama.batch-size=${AI_LOCAL_LLAMA_BATCH_SIZE:64}
ai.local.llama.ubatch-size=${AI_LOCAL_LLAMA_UBATCH_SIZE:32}
ai.local.llama.gpu-layers=0
ai.local.llama.disable-kv-offload=true
ai.local.llama.max-prompt-chars=${AI_LOCAL_LLAMA_MAX_PROMPT_CHARS:500000}
ai.local.llama.system-prompt=${AI_LOCAL_LLAMA_SYSTEM_PROMPT:You are a code-string-first assistant. Treat currentCode as the primary source of truth, use cursorLine and nearby context as the first anchor, do not assume a file path exists, and ask only narrowly scoped follow-up questions when needed. Keep answers brief and factual: what you checked, what you found, and the next step.}
ai.local.llama.fail-fast=true
ai.local.llama.preload-on-startup=false

# Local prompt composition (keeps orchestration reasoning, avoids context blow-up)
# auto = layered when prompt too large / weak machine; layered = slot budget + orchestration digest; orchestration_full = legacy clamp
ai.local.prompt.composition.mode=auto
ai.local.prompt.composition.auto-orchestration-max-chars=22000
ai.local.prompt.composition.orchestration-digest-max-chars=1400
ai.local.prompt.composition.orchestration-memory-max-chars=1200

# Local prompt slot budgets (layered composition — one contract per flow)
ai.local.prompt.slot.active-editor-chars=400000
ai.local.prompt.slot.rag-context-chars=120000
ai.local.prompt.slot.memory-chars=60000
ai.local.prompt.slot.user-request-chars=32000

# Output: normalize/clean by default; hard JSON fallback only when explicitly enabled
ai.local.output.hard-fallback-on-invalid=false
ai.local.output.suppress-raw-stream-when-steps-applied=true
# v7: validate code syntax + menu JSON before emitting completion SSE
ai.local.final-output-gate.enabled=true
ai.local.final-output-gate.code-edit.enabled=true
ai.local.final-output-gate.menu-json.enabled=true
ai.local.final-output-gate.code-block-on-syntax-fail=true
ai.local.final-output-gate.menu-block-on-hard-fail=true

# Evidence: inject editor surface when Lucene RAG is low (configurable context types)
ai.orchestration.evidence.surface-remediation.enabled=true
ai.orchestration.evidence.surface-remediation.context-types=menu_json,code

# Step contract: accept valid structured model output even if agentic step emitter parsed 0 events
ai.code-stream.step-output-contract.accept-structured-without-steps=true
ai.embedding.provider=${AI_EMBEDDING_PROVIDER:llama_cpp_embedding}
ai.embedding.hash.dimensions=${AI_EMBEDDING_HASH_DIMENSIONS:128}
ai.embedding.hash.fallback-enabled=${AI_EMBEDDING_HASH_FALLBACK_ENABLED:true}
ai.embedding.llama.enabled=${AI_EMBEDDING_LLAMA_ENABLED:true}
ai.embedding.llama.model-path=${AI_LOCAL_LLAMA_EMBEDDING_MODEL_PATH:${AI_LOCAL_LLAMA_MODEL_PATH:./csm_datas/ai_local/model/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf}}
ai.embedding.llama.context-window=${AI_EMBEDDING_LLAMA_CONTEXT_WINDOW:2048}
ai.embedding.llama.threads=${AI_EMBEDDING_LLAMA_THREADS:1}
ai.embedding.llama.batch-size=${AI_EMBEDDING_LLAMA_BATCH_SIZE:512}
ai.embedding.llama.ubatch-size=${AI_EMBEDDING_LLAMA_UBATCH_SIZE:512}
ai.embedding.llama.gpu-layers=${AI_EMBEDDING_LLAMA_GPU_LAYERS:0}
ai.embedding.llama.disable-kv-offload=${AI_EMBEDDING_LLAMA_DISABLE_KV_OFFLOAD:true}
ai.embedding.llama.probe-text=${AI_EMBEDDING_LLAMA_PROBE_TEXT:embedding probe text}
# Long-context safety caps (allow larger models while preventing accidental OOM on local runtime)
ai.local.llama.context-window-hard-cap=32768
ai.local.llama.max-prompt-chars-hard-cap=1000000
ai.local.llama.max-tokens-hard-cap=32768
# Runtime profile quick switch:
# - conservative (safe/8k): cap to ~8k ctx, lower memory footprint
# - balanced (16k): default for mixed JSON/code workloads
# - max (quality/32k): highest local context, requires stronger RAM/CPU
# Presets cho 2 Core CPU + 5GB RAM (Qwen2.5-VL-3B Q4_K_M):
# - balanced (default): ctx=8192, max-tokens=512, prompt ~29K chars — đủ cho hầu hết use-case
#   AI_LOCAL_LLAMA_RUNTIME_PROFILE=balanced  AI_LOCAL_LLAMA_CONTEXT_WINDOW=8192  AI_LOCAL_LLAMA_MAX_TOKENS=512
# - conservative (khi RAM sắp hết): ctx=8192, max-tokens=512, nhưng prompt bị clip ở 50K
#   AI_LOCAL_LLAMA_RUNTIME_PROFILE=conservative
# - max (máy mạnh ≥16GB): ctx=16384, max-tokens=1024, prompt 120K
#   AI_LOCAL_LLAMA_RUNTIME_PROFILE=max  AI_LOCAL_LLAMA_CONTEXT_WINDOW=16384  AI_LOCAL_LLAMA_MAX_TOKENS=1024
# Env var AI_LOCAL_LLAMA_RUNTIME_PROFILE trong config.env ghi đè giá trị này
ai.local.llama.runtime-profile=${AI_LOCAL_LLAMA_RUNTIME_PROFILE:balanced}

# Runtime tier (5GB RAM / 2 CPU): auto-detect weak machine or force via profile local-5gb
# AI_LOCAL_MODE=5gb ./start.sh  OR  spring.profiles.active=prod,local-5gb
ai.local.runtime.tier=auto
ai.local.runtime.weak-5gb.skip-orchestration-refine=true
ai.local.runtime.weak-5gb.skip-orchestration-dag-replan=true
ai.local.runtime.weak-5gb.skip-intent-second-pass=true
ai.local.runtime.weak-5gb.single-orchestration-pass=true
ai.local.edit.linked-symbols.enabled=true

# Large file chunking pipeline: split oversized prompts → local chunk-summarize → aggregate
ai.local.chunking.enabled=true
ai.local.chunking.threshold-chars=60000
ai.local.chunking.chunk-size-chars=6000
ai.local.chunking.max-chunks=10
ai.local.chunking.output-budget-chars=2800

# AI assistant prompt shaping
# Enable retrieval of relevant snippets from text/json attachments instead of dumping entire files.
ai.assistant.attachment-retrieval.enabled=true
ai.assistant.attachment-retrieval.max-attachments=8
ai.assistant.attachment-retrieval.max-snippets-per-file=4
ai.assistant.attachment-retrieval.snippet-window-chars=3600
ai.assistant.attachment-retrieval.max-total-chars=50000
# Require model to emit UNDERSTANDING_CHECKLIST before edit output.
ai.assistant.ask-before-edit.enabled=true
# Require structured line-based edits for edit mode completion payloads.
ai.assistant.edit-structured.required=true
ai.assistant.edit-structured.max-text-edits=120
ai.assistant.edit-structured.require-checklist=true
ai.assistant.edit-structured.max-replacement-chars=800000
ai.assistant.menu.direct-provider-fallback-enabled=true
ai.assistant.menu.direct-provider-threshold-chars=160000
ai.assistant.menu.primary-probe-enabled=true
ai.assistant.menu.primary-probe-threshold-chars=100000
ai.assistant.menu.primary-probe-max-prompt-chars=18000
ai.assistant.menu.primary-probe-timeout-ms=12000
ai.assistant.menu.direct-provider-primary-probe-first=true
# Skip quick probe when payload is extremely over direct threshold to avoid redundant calls.
ai.assistant.menu.primary-probe.skip-when-over-ratio=1.4
ai.assistant.menu.disable-gemini-fallback=true
# Data Distillation: compress large JSON attachments (>40k chars) to schema summaries before sending to AI
ai.assistant.menu.distill-large-json=true
ai.assistant.menu.distill-threshold-chars=40000
# Chaining: when total payload > threshold, run a pre-analysis step1 call to summarize configs
ai.assistant.menu.chaining-enabled=true
ai.assistant.menu.chaining-threshold-chars=250000
# Large code editor handling (code context)
ai.assistant.code.large-context-enabled=true
ai.assistant.code.large-threshold-chars=150000
ai.assistant.code.chaining-enabled=true
ai.assistant.code.chaining-threshold-chars=220000
ai.assistant.local-provider.enabled=true
ai.assistant.local-provider.analyze-only=false
ai.assistant.local-provider.max-payload-chars=120000
ai.assistant.local-provider.require-structured-for-edit=true
ai.assistant.code.chaining-cache.enabled=true
ai.assistant.code.chaining-cache.max-entries=240
ai.assistant.code.chaining-cache-ttl-ms=1800000
# Prompt budgets for AI Assistant final request construction (token control)
ai.assistant.prompt-budget.menu.max-chars=140000
ai.assistant.prompt-budget.code.max-chars=90000
ai.assistant.prompt-budget.code-analyze.current-code-max-chars=22000
ai.assistant.prompt-budget.continuity.max-chars=30000
ai.assistant.prompt-budget.global.max-chars=60000
# AI telemetry dashboard + alert thresholds
ai.telemetry.dashboard.window-hours=24
ai.telemetry.alert.fallback-rate-threshold=0.35
ai.telemetry.alert.quick-probe-rate-threshold=0.30
ai.telemetry.alert.min-samples=12
# Local agentic orchestration (plan -> local tools -> compressed context)
ai.orchestration.agentic.enabled=true
ai.orchestration.agentic.max-context-chars=14000
ai.orchestration.agentic.max-code-symbols=40
ai.orchestration.agentic.max-attachment-items=8
ai.orchestration.agentic.max-intents=12
# Routing matrix: planner vs balanced vs complex solver
ai.orchestration.routing.matrix.enabled=true
ai.orchestration.routing.matrix.planner-model=local_provider
ai.orchestration.routing.matrix.balanced-model=local_provider
ai.orchestration.routing.matrix.complex-model=local_provider
# Speculative execution (safe local whitelist operations)
ai.orchestration.speculative.enabled=true
ai.orchestration.speculative.min-attachment-chars=16000
ai.orchestration.speculative.max-json-scan-chars=300000
# Custom Instructions file injected for menu_json context (replaces repeated inline rules)
# Supports app_id template placeholders: {appId} or ${appId}
# Example: csm_datas/ai_local/ai-assistant-instructions-{appId}.md
ai.assistant.custom-instructions.path=backend/csm_datas/ai_local/ai-assistant-instructions.md

# AI Assistant business memory vector store (Markdown -> Lucene KNN)
ai.business.memory.enabled=true
ai.business.memory.index-dir=csm_datas/ai_local/ai_business_memory
ai.business.memory.chunk-max-chars=1600
ai.business.memory.chunk-overlap-chars=120
ai.business.memory.search-default-k=3

# Scoped context ingestion (currentCode/currentMenu → Lucene KNN, async for large files)
ai.context.ingestion.enabled=true
ai.context.ingestion.async.enabled=true
ai.context.ingestion.chunk-size=2200
ai.context.ingestion.max-chunks-per-scope=50
ai.context.ingestion.prune-old-indexes=true
ai.context.ingestion.large-code.enabled=true
ai.context.ingestion.large-code.threshold-chars=45000
ai.context.ingestion.large-code.max-chars=600000
ai.context.ingestion.tenant-snapshot.enabled=true
ai.context.ingestion.tenant-snapshot.tables=csm_roles,csm_depts,csm_branches
ai.context.ingestion.tenant-snapshot.merge-csm-roles=true
ai.context.ingestion.tenant-snapshot.max-rows-per-table=120
ai.retrieval.auth.filter-enabled=true

ai.assistant.custom-instructions.reload-ms=3000
ai.assistant.memory-manager.enabled=true
ai.assistant.memory-manager.context-dir=csm_datas/ai_local
ai.context.dir=csm_datas/ai_local
ai.local.assistant.source-roots=frontend-admin/src,backend/src/main/java,backend/csm_datas/ai_local,lmkt/src,../frontend-admin/src,../backend/src/main/java,csm_datas/ai_local
ai.assistant.memory-manager.max-sources=3
ai.assistant.memory-manager.max-summary-per-source-chars=600
ai.assistant.memory-manager.max-global-context-chars=6000

# Multi-modal scope-aware Lucene retrieval (bitmask-filtered RAG)
ai.orchestration.multimodal.scope-rag.enabled=true
ai.orchestration.multimodal.scope-rag.top-k=3
ai.orchestration.multimodal.scope-rag.max-chars=2500
ai.orchestration.multimodal.dynamic-ingest.async.enabled=true
# Force multimodal (image+json) flow to remain local-only (no cloud fallback)
ai.orchestration.multimodal.local-only=true
# When true, multimodal local-only flow fails fast if local vision endpoint is not ready
ai.orchestration.multimodal.local-only.require-vision=false

# Conversation context truncation (weak-machine optimized)
ai.conversation.context.recent-full-turns-per-scope=3
ai.conversation.context.older-summary-turns-per-scope=6
ai.conversation.context.optimized-window-recent-turns=3
ai.conversation.context.summary-recent-turns=3

# ═══════════════════════════════════════════════════════════════════════════
# CONTEXT BUDGET MANAGER (JTokkit-based token counting + slot-based trimming)
# ═══════════════════════════════════════════════════════════════════════════
# Enable/disable token-aware context fitting before AI calls.
context.budget.enabled=true
# Tokens reserved for model output (subtracted from model context limit to get input budget).
context.budget.output-reserve-tokens=8192
# Additional safety margin on top of output reserve (accounts for tokenizer differences).
context.budget.input-safety-margin-tokens=512

# Legacy gateway shell — all inference routes to local llama.cpp when ai.local.only.enabled=true.
ai.gateway.enabled=true
ai.gateway.api.url=https://invalid.local/disabled-chat-completions
ai.gateway.url=${ai.gateway.api.url}
ai.provider.force-gemini=false
ai.gateway.gemini-enabled=false
# Use token via ai.gateway.token when needed
ai.gateway.auth-scheme=bearer
ai.gateway.auth-fallback-on-401=true
ai.gateway.chat-fallback-url=
ai.gateway.catalog-cache-ms=300000

# Đơn giản hóa auth: chỉ dùng trực tiếp PAT qua header
# Authorization: Bearer <ai.gateway.token>

ai.gateway.model=local_provider
ai.gateway.models=local_provider
ai.gateway.default-fallback-models=local_provider
ai.gateway.menu-allowed-models=local_provider

# Quan trọng: Nâng giới hạn để không bị hệ thống Java tự skip
ai.gateway.max-tokens=16384
# Cấu hình lại giới hạn để không bị Skip
ai.gateway.prioritize-mini=false
ai.gateway.max-output-tokens=1000
ai.gateway.max-prompt-chars=16000
ai.gateway.direct-max-chars=8000
ai.gateway.chunk-mode-threshold-chars=12000
ai.gateway.chunk-size-chars=16000
ai.gateway.chunk-overlap-chars=500
ai.gateway.max-chunks=300
ai.gateway.chunk-summary-max-tokens=2048
ai.gateway.request-max-chars=16000
ai.gateway.merge-batch-size=8
ai.gateway.task-hint-max-chars=16000
ai.gateway.retry.max-attempts=8
ai.gateway.retry.base-wait-ms=65000
# 429 handling: avoid long per-model stalls during chunking by failing over quickly.
# Retry at most 0 times on same model for rate-limit; immediately rotate to next fallback model.
ai.gateway.retry.max-rate-retries-per-model=0
# If server asks to wait longer than this on 429, skip wait and switch model immediately.
ai.gateway.retry.max-429-wait-ms=8000
ai.gateway.model-rate-limit-cooldown-ms=600000
ai.gateway.model-unknown-cooldown-ms=21600000
ai.gateway.rotate-candidates=false
# Local pre-throttle only: keep low gap between requests, let real 429 headers drive backoff.
ai.gateway.throttle.min-interval-ms=800
# Raise token-per-minute budget so chunked flow does not self-throttle too aggressively.
ai.gateway.tpm-limit=120000
ai.gateway.temperature.direct=0.0
ai.gateway.temperature.chunk-summary=0.1
ai.gateway.temperature.merge=0.1
ai.gateway.stability.menu-only-context-injection=true
ai.orchestration.web-search.enabled=false
AI_ORCHESTRATION_WEB_SEARCH_ENABLED=false
# API key/token placeholders (set via env AI_GATEWAY_API_KEY if legacy path ever needed)
ai.gateway.api-key=${AI_GATEWAY_API_KEY:}
ai.gateway.token=${AI_GATEWAY_TOKEN:${ai.gateway.api-key}}

# ═══════════════════════════════════════════════════════════════════════════
# FEATURE 1: Response Caching - Cache identical prompt responses (1 hour TTL)
# ═══════════════════════════════════════════════════════════════════════════
ai.gateway.response-cache-enabled=true
ai.gateway.response-cache.ttl-ms=3600000
ai.gateway.response-cache.max-entries=1000

# ═══════════════════════════════════════════════════════════════════════════
# FEATURE 3: Smart Model Selection - Choose model based on task/size
# ═══════════════════════════════════════════════════════════════════════════
ai.gateway.smart-selection-enabled=true
# Threshold for code tasks (e.g., < 5KB: use codex-mini; >= 5KB: use gpt-4.1)
ai.gateway.smart-selection.code-task-threshold-chars=5000
# Threshold for large contexts (route to Gemini for > 50KB)
ai.gateway.smart-selection.large-context-threshold-chars=50000
# Threshold for large menu_json/menu_design requests (route to Gemini earlier than generic large-context tasks)
ai.gateway.smart-selection.menu-gemini-threshold-chars=15000
# Force menu flows to remain on direct provider path
ai.gateway.menu.force-direct-provider=true

# JWT secret for csm-token (set a strong value in production)
jwt.secret=change-me-to-a-strong-secretge

# Google Index API Configuration
google.index.service-account-path=./index-google-service-account.json
google.index.daily-limit=200

# Auto-Index Service Configuration
# Kích hoạt/tắt dịch vụ auto-index
auto-index.enabled=true
# Số URLs gom lại trong 1 batch
auto-index.batch-size=5
# Độ trễ giữa các batch (ms)
auto-index.batch-delay-ms=2000
# Kiểm tra indexing status trước khi gửi
auto-index.check-before-index=true
# Giới hạn số URL pending per domain để tránh quá tải
auto-index.max-pending-per-domain=1000

