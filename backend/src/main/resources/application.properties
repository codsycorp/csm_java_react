# ⚡ OPTIMIZED FOR 10K CONCURRENT USERS
# Strategy: Many connections + few threads + async I/O + keep-alive
# - Max threads: 200 (không quá nhiều để tránh context switching)
# - Max connections: 10000 (NIO cho phép 10k connections với ít threads)
# - Keep-alive: Tái sử dụng connections, giảm overhead
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=200
server.tomcat.max-connections=3000
server.tomcat.connection-timeout=180000
server.tomcat.keep-alive-timeout=30000
server.tomcat.max-keep-alive-requests=200
server.tomcat.processor-cache=100

# Auth API rate limiting (per workstation/client key)
# Applies to login/register/refresh endpoints in RateLimitingFilter
security.auth-rate-limit.max-requests-per-minute=120
security.auth-rate-limit.window-ms=60000
security.auth-rate-limit.cleanup-interval-ms=60000
security.auth-rate-limit.tracker-ttl-ms=600000

# ⚡ UNLIMITED REQUEST SIZE - Cho phép client gửi nội dung dài không giới hạn
# -1 = unlimited, đặc biệt hữu ích cho AI content generation với nội dung dài
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-parameter-count=-1
server.tomcat.max-http-header-size=1MB
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true

# Response compression for Google PageSpeed
server.compression.enabled=true
server.compression.mime-types=text/html,text/plain,text/xml,application/json,application/javascript,text/css,image/svg+xml,application/xml
server.compression.min-response-size=1024

# Connection & Performance Settings
server.connection-timeout=180000
server.http2.enabled=true
spring.main.web-application-type=servlet
spring.main.lazy-initialization=false
spring.main.allow-bean-definition-overriding=false
server.port=15300

# 🔴 HikariCP Connection Pool - Optimized for RocksDB embedded DB
# RocksDB không cần nhiều connections, chủ yếu cho Lucene + metadata
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=CSM-HikariPool
spring.datasource.hikari.register-mbeans=false

# Redis Configuration for distributed caching - Optimized for 10k users
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=3000
spring.redis.lettuce.pool.max-active=50
spring.redis.lettuce.pool.max-idle=20
spring.redis.lettuce.pool.min-idle=5
spring.redis.lettuce.pool.max-wait=3000ms
spring.redis.lettuce.shutdown-timeout=200ms

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false
spring.cache.cache-names=apiCache,pageCache,dataCache
spring.main.lazy-initialization=true
socket.server.port=15301
socket.server.host=0.0.0.0
ml.config.external-path=./ml_configs_runtime
# Đường dẫn gốc chung cho tất cả dữ liệu của ứng dụng
app.data.dir=./csm_datas

# Đường dẫn gốc cho tất cả các RocksDB databases
# Sử dụng @{app.data.dir} để tham chiếu đến thư mục gốc chung
rocksdb.root.dir=${app.data.dir}/database

# Đường dẫn gốc cho tất cả các thư mục backup của RocksDB
rocksdb.backup.dir=${app.data.dir}/backups

# Đường dẫn gốc cho tất cả các Lucene indexes
lucene.index.root.dir=${app.data.dir}/lucene_index

gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/%s:generateContent?key=
# Multi-model rotation list - rotate giữa các models để spread quota (Updated to latest stable models)
gemini.models=gemini-2.5-flash,gemini-2.5-pro,gemini-2.0-flash-001,gemini-2.5-flash-lite,gemma-3-27b-it
gemini.model=gemini-2.5-flash
# Quota limits per model (free tier)
gemini.model.quota.per-minute=60
gemini.model.quota.per-day=1500
# Cooldown when a Gemini model returns transient 503/UNAVAILABLE (ms)
gemini.model.unavailable-cooldown-ms=120000

# AI prompt limits for /ai-generate-seo-content
# Endpoint accepts up to 1,000,000 characters and routes prompts larger than gemini threshold to GitHub Models.
# Đẩy ngưỡng lên để Gemini (1500 req/ngày) xử lý prompt trung bình, GitHub Models (50 req/ngày) chỉ là last resort cho prompt cực lớn
ai.prompt.max-chars=3000000
ai.prompt.gemini-max-chars=900000
ai.async.job-ttl-ms=3600000
ai.async.poll-min-ms=3000
ai.routing.stability.force-copilot-for-coding=false
ai.routing.stability.prefer-github-for-coding=true
ai.routing.stability.disable-fallback-for-coding=false

# Copilot prompt shaping
# Enable retrieval of relevant snippets from text/json attachments instead of dumping entire files.
copilot.attachment-retrieval.enabled=true
copilot.attachment-retrieval.max-attachments=8
copilot.attachment-retrieval.max-snippets-per-file=6
copilot.attachment-retrieval.snippet-window-chars=3600
copilot.attachment-retrieval.max-total-chars=80000
# Require model to emit UNDERSTANDING_CHECKLIST before edit output.
copilot.ask-before-edit.enabled=true
# Require structured line-based edits for edit mode completion payloads.
copilot.edit-structured.required=true
copilot.edit-structured.max-text-edits=120
copilot.edit-structured.require-checklist=true
copilot.edit-structured.max-replacement-chars=800000

# ═══════════════════════════════════════════════════════════════════════════
# CONTEXT BUDGET MANAGER (JTokkit-based token counting + slot-based trimming)
# ═══════════════════════════════════════════════════════════════════════════
# Enable/disable token-aware context fitting before AI calls.
context.budget.enabled=true
# Tokens reserved for model output (subtracted from model context limit to get input budget).
context.budget.output-reserve-tokens=8192
# Additional safety margin on top of output reserve (accounts for tokenizer differences).
context.budget.input-safety-margin-tokens=512

# GitHub Models fallback (dùng khi prompt vượt giới hạn luồng Gemini trong /ai-generate-seo-content)
github.models.enabled=true
# GitHub Models Inference endpoint
github.models.url=https://models.inference.ai.azure.com/chat/completions
# Use Bearer token (PAT via github.models.token or env GITHUB_TOKEN)
github.models.auth-scheme=bearer
github.models.auth-fallback-on-401=true
github.models.chat-fallback-url=
github.models.catalog-cache-ms=300000

# Dùng token Copilot session (dạng xc...), KHÔNG dùng PAT ghp_ cho endpoint này.
# Khuyến nghị đặt qua env GITHUB_COPILOT_TOKEN thay vì hardcode file.
github.models.copilot-token=
# Tự đổi PAT (github.models.token hoặc env GITHUB_TOKEN) sang Copilot session token khi gọi endpoint Copilot Individual.
github.models.copilot-token-auto-exchange=true
# Làm mới token sớm trước khi hết hạn (ms).
github.models.copilot-token-refresh-skew-ms=300000
# Nếu exchange thất bại, tạm ngưng thử lại trong khoảng thời gian này để tránh spam log (ms).
github.models.copilot-token-exchange-failure-cooldown-ms=300000
# Nếu tất cả endpoint exchange đều trả 404, kéo dài thời gian thử lại (ms) để tránh noise.
github.models.copilot-token-exchange-notfound-cooldown-ms=21600000
# Override endpoint exchange token nếu hệ thống của anh yêu cầu endpoint khác.
# Ví dụ: https://api.github.com/copilot_internal/v2/token
github.models.copilot-token-exchange-url=
# Header mô phỏng Copilot client cho token exchange (tăng tỷ lệ thành công với một số account/environment).
github.models.copilot-token-exchange.user-agent=GitHubCopilotChat/0.0.1
github.models.copilot-token-exchange.editor-version=vscode/1.99.0
github.models.copilot-token-exchange.editor-plugin-version=copilot-chat/0.26.7

github.models.model=gpt-4.1
github.models.models=gpt-4.1,gpt-4o,gpt-4o-mini
github.models.default-fallback-models=gpt-4o,gpt-4o-mini

# Quan trọng: Nâng giới hạn để không bị hệ thống Java tự skip
github.models.max-tokens=16384
# Cấu hình lại giới hạn để không bị Skip
github.models.prioritize-mini=false
github.models.max-output-tokens=8192
github.models.max-prompt-chars=3000000
github.models.direct-max-chars=20000
github.models.chunk-size-chars=16000
github.models.chunk-overlap-chars=500
github.models.max-chunks=300
github.models.chunk-summary-max-tokens=2048
github.models.request-max-chars=22000
github.models.merge-batch-size=8
github.models.task-hint-max-chars=16000
github.models.retry.max-attempts=8
github.models.retry.base-wait-ms=65000
# 429 handling: avoid long per-model stalls during chunking by failing over quickly.
# Retry at most 1 time on same model for rate-limit; then rotate to next fallback model.
github.models.retry.max-rate-retries-per-model=1
# If server asks to wait longer than this on 429, skip wait and switch model immediately.
github.models.retry.max-429-wait-ms=8000
github.models.throttle.min-interval-ms=3500
github.models.tpm-limit=28000
github.models.temperature.direct=0.2
github.models.temperature.chunk-summary=0.1
github.models.temperature.merge=0.2
github.models.stability.menu-only-context-injection=true
# GitHub token (PAT) với quyền dùng GitHub Models
