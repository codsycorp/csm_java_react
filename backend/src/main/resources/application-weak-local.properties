# Weak Local Profile: strict local-only runtime for 2-core/6GB servers
# Loaded AFTER application-prod.properties when spring.profiles.active includes "weak-local"
# Purpose: Override prod defaults for weak-machine safety (disable features that eat CPU/memory)

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🚨 STRICT LOCAL-ONLY MODE: Guarantee no cloud fallback interference
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ai.local.only.enabled=true
ai.local.llama.prefer-local-first=true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🧠 ORCHESTRATION TUNING for Weak Machines (disable CPU-heavy features)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Disable speculative execution (expensive for 2-core systems)
ai.orchestration.speculative.enabled=false

# Enable agentic orchestration (core feature for step-by-step planning)
# NOTE: This is already =true in application.properties; explicitly set here for clarity
ai.orchestration.agentic.enabled=true

# Reduce agentic plan context size on weak machines
ai.orchestration.agentic.max-context-chars=8000
ai.orchestration.agentic.max-code-symbols=20
ai.orchestration.agentic.max-attachment-items=4
ai.orchestration.agentic.max-intents=6

# Disable expensive routing matrix (use simple local-only routing instead)
ai.orchestration.routing.matrix.enabled=false

# Enable multimodal scanning but keep it lightweight
ai.orchestration.multimodal.scope-rag.enabled=true
ai.orchestration.multimodal.scope-rag.top-k=3
ai.orchestration.multimodal.scope-rag.max-chars=2000

# Use async dynamic ingest for non-blocking operation on weak machines
ai.orchestration.multimodal.dynamic-ingest.async.enabled=true

# Keep local-only multimodal mode strict (no cloud fallback)
ai.orchestration.multimodal.local-only=true
ai.orchestration.multimodal.local-only.require-vision=false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🧵 LLAMA.CPP: Already tuned via start.sh command-line args, but ensure consistency
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Batch size: tuned for CPU-only weak machines (start.sh overrides to 32)
ai.local.llama.batch-size=32
ai.local.llama.ubatch-size=16

# Context and output caps
ai.local.llama.context-window=2048
ai.local.llama.max-tokens=96
ai.local.llama.max-prompt-chars=18000

# Thread config: must match CPU core count
ai.local.llama.threads=1
ai.local.llama.max-concurrent-requests=1

# Load-shedding: protect weak machine from overload
ai.local.llama.load-shed.enabled=true
ai.local.llama.load-shed.max-load-per-core=1.15
ai.local.llama.load-shed.min-free-heap-mb=384

# Inter-request cooldown: allow system to cool down between calls
ai.local.llama.inter-request-cooldown-ms=1800
ai.local.llama.overload-cooldown-ms=3000

# Preload model on startup causes hang on 2-core systems; do not preload
ai.local.llama.preload-on-startup=false

# Weak machine stability settings
ai.local.llama.force-single-thread-on-weak=true
ai.local.llama.weak-core-threshold=2
ai.local.llama.acquire-timeout-ms=1200

# Wait for system stability before inference
ai.local.llama.wait-until-stable.enabled=true
ai.local.llama.wait-until-stable.max-wait-ms=0
ai.local.llama.wait-until-stable.poll-ms=250
ai.local.llama.wait-until-stable.log-interval-ms=5000
ai.local.llama.wait-until-stable.max-waiting-requests=3

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🔒 CACHE & MEMORY: Disable expensive warming on weak machines
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
cache.warming.enabled=false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 📊 TASK SCHEDULING: Reduce concurrency on 2-core machines
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.task.scheduling.pool.size=1
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=64

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🎯 FAST-PATH OPTIMIZATION: Enable rate limiting for auto-messages on weak machines
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
chat.ai.auto-message.local-generation.enabled=true
chat.ai.auto-message.rate-limit.enabled=true
chat.ai.auto-message.rate-limit.min-interval-ms=180000
chat.ai.auto-message.rate-limit.window-ms=900000
chat.ai.auto-message.rate-limit.max-per-window=2

# De-duplicate identical prompts to avoid redundant inference
chat.ai.auto-message.prompt-dedupe.enabled=true
chat.ai.auto-message.prompt-dedupe.window-ms=120000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 📝 LUCENE: Business memory tuning
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ai.business-memory.search-default-k=3
ai.business-memory.chunk-max-chars=2200
ai.business-memory.chunk-overlap-chars=220

# Dynamic memory pruning on weak machines
ai.orchestration.multimodal.dynamic-ingest.max-sources=24
ai.orchestration.multimodal.dynamic-ingest.max-age-ms=1200000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ⏱️ TIMEOUT: SSE stays open longer for local inference (can take >30s on weak machines)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ai.code-stream.sse-timeout-ms=900000
ai.code-stream.sse-timeout.adaptive.enabled=true
ai.code-stream.sse-timeout.adaptive.min-ms=180000
ai.code-stream.sse-timeout.adaptive.max-ms=3600000
ai.code-stream.sse-timeout.adaptive.weak-server-force-infinite=true

# SEO one-shot on weak CPU: smaller output cap than default prod (guest chat stays 96 tok)
ai.seo.creative-params.max-tokens=256
ai.seo.article.max-tokens=1024
ai.seo.article.target-words-vi=500-800
# Context đủ cho prompt compact + ~1024 tok output (tránh clip prompt SEO dài)
ai.local.llama.context-window=4096

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 🔚 OFF-TOPIC FAST-FINISH: Strict confidence threshold for quick responses
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ai.orchestration.fast-unrelated.enabled=true
ai.orchestration.fast-unrelated.confidence-threshold=0.85
