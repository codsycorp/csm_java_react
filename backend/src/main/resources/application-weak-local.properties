# Weak server profile: local-only AI, speed-first.
# Target: 2 CPU cores, 5-6GB RAM.
# Usage:
#   SPRING_PROFILES_ACTIVE=prod,weak-local
# For large payload jobs (slower, broader limits), combine with:
#   SPRING_PROFILES_ACTIVE=prod,weak-local,weak-local-large

# -----------------------------------------------------------------------------
# Strict local-only routing (disable cloud path)
# -----------------------------------------------------------------------------
ai.local.force-all-flows=true
ai.local.menu.force-local-only=true
ai.router.score-v2.enabled=true
ai.router.score-v2.local-only-hard=true
ai.router.score-v2.menu-json-cloud=false

# Keep code-stream local path enabled and bounded
ai.code-stream.local-provider.enabled=true
ai.code-stream.local-provider.analyze-only=false
ai.code-stream.local-provider.allow-menu-json=true
ai.code-stream.local-provider.require-structured-for-edit=true
ai.code-stream.local-provider.max-prompt-chars=45000

# Force AI assistant local provider path
ai.assistant.local-provider.enabled=true
ai.assistant.local-provider.analyze-only=false
ai.assistant.local-provider.max-payload-chars=90000
ai.assistant.menu.disable-gemini-fallback=true

# -----------------------------------------------------------------------------
# llama.cpp runtime caps for weak servers (speed-first)
# -----------------------------------------------------------------------------
ai.local.llama.runtime-profile=conservative
ai.local.llama.context-window=4096
ai.local.llama.max-tokens=256
ai.local.llama.max-prompt-chars=60000
ai.local.llama.threads=2
ai.local.llama.batch-size=128
ai.local.llama.ubatch-size=64
ai.local.llama.temperature=0.1
ai.local.llama.top-p=0.8
ai.local.llama.top-k=24
ai.local.llama.preload-on-startup=false

# Keep per-flow output short to reduce tail latency
ai.local.direct.output.max-tokens=384
ai.local.direct.output.menu-edit-max-tokens=512
ai.local.direct.output.analyze-max-tokens=320
ai.local.direct.output.question-max-tokens=192

# -----------------------------------------------------------------------------
# Prompt + context budgets (major latency driver)
# -----------------------------------------------------------------------------
ai.code-stream.max-prompt-chars=50000
ai.code-stream.menu.max-prompt-chars=70000
ai.code-stream.max-current-code-chars=24000
ai.code-stream.max-attachment-chars-per-file=8000
ai.code-stream.max-attachments-total-chars=24000

ai.assistant.prompt-budget.menu.max-chars=80000
ai.assistant.prompt-budget.code.max-chars=50000
ai.assistant.prompt-budget.code-analyze.current-code-max-chars=14000
ai.assistant.prompt-budget.continuity.max-chars=12000
ai.assistant.prompt-budget.global.max-chars=28000

# -----------------------------------------------------------------------------
# Reduce extra local passes/chaining/probes for speed
# -----------------------------------------------------------------------------
ai.local.pre-analysis.enabled=false
ai.assistant.menu.primary-probe-enabled=false
ai.assistant.menu.chaining-enabled=false
ai.assistant.code.chaining-enabled=false
ai.code-stream.auto-continue.enabled=false
ai.menu.auto-continue.enabled=false

# Keep map-reduce available but minimal
ai.local.map-reduce.enabled-for-menu-json=true
ai.local.map-reduce.menu-threshold-chars=45000
ai.local.map-reduce.code-threshold-chars=90000
ai.local.map-reduce.chunk-chars=10000
ai.local.map-reduce.overlap-chars=400
ai.local.map-reduce.max-chunks=8
ai.local.map-reduce.parallel-enabled=false
ai.local.map-reduce.parallelism=1
ai.local.map-reduce.parallelism.weak-server-max=1

# -----------------------------------------------------------------------------
# Lightweight intent classify (step-1)
# -----------------------------------------------------------------------------
ai.local.intent-classify.cache-ttl-ms=60000
ai.local.intent-classify.adaptive-cache-ttl-ms=1800000
ai.local.intent-classify.adaptive-cache-min-confidence=84
ai.local.intent-classify.confidence-threshold=58
ai.local.intent-classify.second-pass.enabled=true
ai.local.intent-classify.second-pass.min-request-chars=140
ai.local.intent-classify.token.min=28
ai.local.intent-classify.token.max=56
ai.local.intent-classify.token.first-pass.base=30
ai.local.intent-classify.token.second-pass.base=44
ai.local.intent-classify.token.length-step-chars=220
ai.local.intent-classify.token.length-step-increase=4
ai.local.intent-classify.token.complexity-step-increase=2
ai.local.intent-classify.token.complexity-max-bonus=10

# Fast Q&A local cap
ai.local.fast-question.enabled=true
ai.local.fast-question.max-question-chars=1200
ai.local.fast-question.max-tokens=128

# -----------------------------------------------------------------------------
# Local context retrieval caps (Lucene / assistant context)
# -----------------------------------------------------------------------------
ai.local.assistant.max-file-chars=180000
ai.local.assistant.chunk-max-chars=1600
ai.local.assistant.chunk-overlap-chars=100
ai.local.assistant.max-hits=3
ai.local.assistant.max-retrieval-chars=9000
ai.local.assistant.menu.max-hits=6
ai.local.assistant.menu.max-retrieval-chars=28000
ai.local.assistant.max-analysis-chars=90000
ai.local.assistant.index-refresh-ms=900000

# Optional: disable speculative local analyzers for large payloads
ai.orchestration.speculative.enabled=false

# SSE: keep long enough to avoid false timeout on weak hardware
ai.code-stream.sse-timeout-ms=900000
