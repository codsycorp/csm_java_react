# Fast-but-complete local profile for AI code stream:
# - Keep local pre-analysis/context compression
# - Disable slow local full generation path
# - Prefer cloud for menu_json heavy flows
ai.code-stream.local-provider.enabled=false
ai.router.score-v2.menu-json-cloud=true
ai.router.score-v2.hybrid-threshold=45

# Reduce payload size after compression to improve latency while preserving coverage
ai.code-stream.menu.chunked-context-threshold-chars=90000
ai.code-stream.menu.chunked-context-max-chars=85000

# Trim continuity/global memory blocks to avoid prompt bloat
ai.assistant.prompt-budget.continuity.max-chars=20000
ai.assistant.prompt-budget.global.max-chars=45000
