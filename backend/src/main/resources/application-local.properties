# Hard local-only profile for AI code stream:
# - Keep local pre-analysis/context compression
# - Keep full generation on local llama only
# - Never route code/menu flows to cloud
ai.code-stream.local-provider.enabled=true
ai.router.score-v2.menu-json-cloud=false
ai.router.score-v2.hybrid-threshold=0
ai.router.score-v2.local-only-hard=true

# Local fast-light preset (applies when running with local profile directly).
# Goal: keep prefill short to avoid long `prompt processing progress` loops.
ai.local.pre-analysis.enabled=false
ai.local.llama.context-window=4096
ai.local.llama.max-tokens=128
ai.local.llama.max-prompt-chars=120000
ai.local.llama.batch-size=128
ai.local.llama.ubatch-size=64
ai.code-stream.local-provider.max-prompt-chars=45000
ai.assistant.prompt-budget.code.max-chars=50000
ai.assistant.prompt-budget.code-analyze.current-code-max-chars=14000
ai.assistant.prompt-budget.continuity.max-chars=12000
ai.assistant.prompt-budget.global.max-chars=30000

# Reduce payload size after compression to improve latency while preserving coverage
ai.code-stream.menu.chunked-context-threshold-chars=90000
ai.code-stream.menu.chunked-context-max-chars=85000

# Trim continuity/global memory blocks to avoid prompt bloat
ai.assistant.prompt-budget.continuity.max-chars=12000
ai.assistant.prompt-budget.global.max-chars=30000
