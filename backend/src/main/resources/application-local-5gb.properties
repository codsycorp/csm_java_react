# =============================================================================
# CSM AI Local — Profile: local-5gb (v7 production target)
# Machine: ~5GB RAM total, 2 CPU, qwen2.5-coder-1.5b-instruct Q4_K_M
# Launch: AI_LOCAL_MODE=5gb ./start.sh
#         or SPRING_PROFILES_ACTIVE=prod,local-5gb
#
# Principle: NẠP ĐỦ VÀO HỆ THỐNG — KHÔNG NẠP HẾT VÀO MODEL
# - Full source → async ingest → Lucene/RocksDB (background)
# - Model prompt → condensed editor + top-K RAG chunks only
# - Edit output → buffer → validate → textEdits → CodeMirror
# =============================================================================

ai.local.runtime.tier=weak-5gb
ai.local.only.enabled=true
ai.local.llama.prefer-local-first=true

# ── LLM: enough context for linked-symbol textEdits, bounded for 5GB ─────────
ai.local.llama.runtime-profile=balanced
ai.local.llama.context-window=8192
ai.local.llama.max-tokens=768
ai.local.llama.max-prompt-chars=32000
ai.local.llama.threads=1
ai.local.llama.batch-size=32
ai.local.llama.ubatch-size=16
ai.local.llama.max-concurrent-requests=1
ai.local.llama.preload-on-startup=false
ai.local.llama.load-shed.enabled=true
ai.local.llama.load-shed.min-free-heap-mb=384
ai.local.llama.inter-request-cooldown-ms=1200
ai.local.llama.force-single-thread-on-weak=true

# Embedding: hash 128D on weak — không load thêm model, tránh mismatch 1536 vs 1024
ai.embedding.provider=hash
ai.embedding.llama.enabled=false
ai.embedding.hash.dimensions=128
ai.embedding.hash.fallback-enabled=true
ai.embedding.llama.threads=1
ai.embedding.llama.batch-size=256
ai.embedding.llama.ubatch-size=128

# ── Prompt composition: slot budget, auto layered on weak ───────────────────
ai.local.prompt.composition.mode=auto
ai.local.prompt.composition.auto-orchestration-max-chars=16000
ai.local.prompt.composition.orchestration-digest-max-chars=1200
ai.local.prompt.composition.orchestration-memory-max-chars=900
# Slot budgets for buildLocalMinimalPrompt (weak / 1.5B — Cursor-style small context)
ai.local.prompt.slot.active-editor-chars=14000
ai.local.prompt.slot.rag-context-chars=2800
ai.local.prompt.slot.memory-chars=900
ai.local.prompt.slot.user-request-chars=3200
ai.local.runtime.weak-profile.local-provider.max-prompt-chars=18000
ai.assistant.prompt-budget.code.max-chars=32000
ai.assistant.prompt-budget.code-analyze.current-code-max-chars=18000
ai.assistant.local-provider.max-payload-chars=36000
ai.code-stream.local-provider.max-prompt-chars=32000
ai.code-stream.max-prompt-chars=36000

# ── Orchestration: plan + RAG ON; expensive loops OFF ───────────────────────
ai.orchestration.agentic.enabled=true
ai.orchestration.agentic.max-context-chars=10000
ai.orchestration.agentic.max-code-symbols=24
ai.orchestration.agentic.max-attachment-items=4
ai.orchestration.agentic.max-intents=8
ai.orchestration.speculative.enabled=false
ai.orchestration.routing.matrix.enabled=false
ai.orchestration.multimodal.scope-rag.enabled=true
ai.orchestration.multimodal.scope-rag.top-k=3
ai.orchestration.multimodal.scope-rag.max-chars=2800
ai.orchestration.multimodal.dynamic-ingest.async.enabled=true
ai.orchestration.multimodal.dynamic-ingest.max-sources=20
ai.local.orchestration.evidence-refine.enabled=false
ai.local.orchestration.tool-dag.replan.enabled=false
ai.local.orchestration.large-code-region-plan.max-regions=5
ai.local.orchestration.large-code-region-plan.max-chars=22000

# ── Intent / analyze: model-driven routing (AI #1 decides edit vs analyze) ───
ai.local.routing.model-driven.enabled=true
ai.local.routing.model-driven.min-confidence=55
ai.local.analyze.guardrail.heuristic-fallback.enabled=false
ai.local.analyze.language-alignment.enabled=true
ai.local.analyze.language-alignment.max-tokens=384

# ── Intent / analyze: single-pass on weak to save CPU ────────────────────────
ai.local.intent-classify.second-pass.enabled=false
ai.local.analyze.low-confidence-retry.enabled=false
ai.local.analyze.broad-gap-fill.enabled=false

# ── Large file: chunk ingest + map-reduce caps ───────────────────────────────
ai.local.chunking.enabled=true
ai.local.chunking.threshold-chars=45000
ai.local.chunking.chunk-size-chars=5000
ai.local.chunking.max-chunks=6
ai.local.runtime.weak-profile.map-reduce.max-chunks=3
ai.local.runtime.weak-profile.map-reduce.chunk-chars=8000

# ── Large DynamicCode: async Lucene KNN ingest (non-blocking) ────────────────
ai.context.ingestion.large-code.enabled=true
ai.context.ingestion.large-code.threshold-chars=45000
ai.context.ingestion.large-code.max-chars=600000

# ── Business memory / RAG (v7 §12) ─────────────────────────────────────────
ai.business.memory.chunk-max-chars=1600
ai.business.memory.chunk-overlap-chars=120
ai.business.memory.search-default-k=3
ai.assistant.memory-manager.max-sources=3
ai.assistant.memory-manager.max-global-context-chars=6000

# ── Step contract / verifier: Cursor-style direct textEdits on weak ───────────
ai.code-stream.step-output-contract.strict-edit=false
ai.local.agentic.step.verifier.enabled=false
ai.local.evidence-gate.enabled=false
ai.orchestration.multimodal.scope-rag.adaptive.max-max-chars=2800
ai.orchestration.multimodal.scope-rag.adaptive.min-max-chars=1800
ai.orchestration.multimodal.scope-rag.quality.retry-on-low=false

# ── Edit accuracy gates (always ON) ─────────────────────────────────────────
ai.local.final-output-gate.enabled=true
ai.local.final-output-gate.code-edit.enabled=true
ai.local.final-output-gate.menu-json.enabled=true
ai.local.final-output-gate.code-block-on-syntax-fail=true
ai.code-stream.edit.patch-validator.enabled=true
ai.code-stream.edit.patch-validator.ast-guard.enabled=true
ai.code-stream.edit.semantic-verify.enabled=true
ai.code-stream.edit.semantic-verify.max-attempts=1
ai.assistant.edit-structured.required=true
ai.local.edit.linked-symbols.enabled=true

# ── Large-file edit pipeline (weak 1.5B) ─────────────────────────────────────
ai.edit.local.symbol-micro-first.enabled=true
ai.edit.lifecycle-deterministic-fallback.enabled=true
ai.edit.header-zone-protect-min-line=100
ai.edit.surgical-max-line-span=40
ai.edit.task-planner.multi-slice-execution.enabled=true

# ── JVM / Tomcat / scheduling (2-core friendly) ─────────────────────────────
cache.warming.enabled=false
spring.task.scheduling.pool.size=1
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
ai.code-stream.sse-timeout.adaptive.weak-server-force-infinite=true

# ── Lane 5 media (5GB / 2 CPU): KHÔNG render video — chỉ API + SEO/code ───────
# Render Character Director cần ~2GB spike (ONNX + FFmpeg × N cảnh) → OOM trên server.
# Chạy render trên M1 dev (config.local-m1.env) rồi copy file vào app_images.
ai.media.render.enabled=false
ai.media.character.enabled=false
ai.media.storyboard.enabled=true
ai.media.storyboard.max-scenes=3
ai.media.render.max-duration-sec=15

# ── PHẦN AC — Business Comprehension & Greenfield (local-5gb) ────────────────
ai.local.business-comprehension.enabled=true
ai.local.business-comprehension.required-on-greenfield=true
ai.local.business-comprehension.required-on-sample-attachment=true
ai.local.business-comprehension.comprehend-max-tokens=768
ai.local.business-comprehension.worker-max-tokens=1536
ai.local.greenfield.menu-auto-continue-max-attempts=3
ai.local.business-comprehension.sequential-infer=true
ai.local.business-comprehension.deterministic-seed-fallback=true
ai.local.business-comprehension.heuristic-fallback.enabled=false
ai.local.business-comprehension.deterministic-seed-fallback.menu-greenfield.enabled=false
ai.local.business-comprehension.menu-greenfield-fast-path.enabled=false
ai.local.prompt.slot.contract-chars=14000
ai.local.business-comprehension.sample-menu-digest-max-chars=4000
ai.local.business-comprehension.sample-code-digest-max-chars=6000
ai.local.business-comprehension.worker-prompt-block-max-chars=2000
ai.local.greenfield.enabled=true
ai.local.greenfield.menu-seed-module-count=1
ai.local.greenfield.code-scaffold-template=csm_dynamiccode_v1
ai.local.greenfield.menu-scaffold-enabled=true
ai.local.greenfield.menu-scaffold-first.enabled=true
ai.local.greenfield.menu-module-enrich.enabled=true
ai.local.greenfield.menu-module-enrich.max-modules=16
ai.local.greenfield.menu-module-enrich.max-tokens=384
ai.local.greenfield.gate-before-apply.enabled=true
ai.local.greenfield.menu-module-replan.enabled=true
ai.local.greenfield.menu-module-replan.max-attempts=1
ai.local.rag.citations.max-hits=5
ai.local.greenfield.live-menu-pattern-index.enabled=true
ai.local.greenfield.live-menu-pattern-index.max-leaves=120
ai.local.business-comprehension.required-on-edit-with-editor=true
ai.local.business-comprehension.active-editor-digest-max-chars=6000
ai.local.business-comprehension.system-master-digest-max-chars=2400
