# Production profile: cost-optimized + tuned for 2 Core / 6 GB RAM cloud server

gemini.model=gemini-2.5-flash
gemini.streaming.max-tokens=8192
gemini.streaming.temperature=0.2
# Give Gemini a hard timeout so hung requests don't hold Tomcat threads forever.
gemini.streaming.request-timeout-ms=90000
# SSE connection lifetime cap.
# Local AI on 2-core nodes can exceed 120s on heavy prompts; use 15m to avoid premature stream close.
ai.code-stream.sse-timeout-ms=900000
# Adaptive timeout by server strength + request size.
# On weak servers (<=2 cores or <=6GB JVM max memory), force infinite SSE to avoid mid-stream closure.
ai.code-stream.sse-timeout.adaptive.enabled=true
ai.code-stream.sse-timeout.adaptive.min-ms=180000
ai.code-stream.sse-timeout.adaptive.max-ms=3600000
ai.code-stream.sse-timeout.adaptive.message-char-ms=24
ai.code-stream.sse-timeout.adaptive.code-char-ms=4
ai.code-stream.sse-timeout.adaptive.cores-baseline=8
ai.code-stream.sse-timeout.adaptive.memory-gb-baseline=16
ai.code-stream.sse-timeout.adaptive.weak-server-cores-threshold=2
ai.code-stream.sse-timeout.adaptive.weak-server-memory-gb-threshold=6
ai.code-stream.sse-timeout.adaptive.weak-server-force-infinite=true
ai.code-stream.sse-timeout.adaptive.safety-multiplier=1.35

# ── Local llama.cpp: tuned for 2-core CPU server ─────────────────────────────
# CRITICAL: batch-size=48 is 10× slower than 512 for prompt eval on CPU.
# At 2 cores, each batch is a full attention pass over all layers for N tokens.
# batch-size=512 → ~14 batch loops for a 7k-token prompt vs ~147 loops at 48.
ai.local.llama.batch-size=256
ai.local.llama.ubatch-size=128
# Keep max output tokens reasonable; fast-question is capped at 384 by its own limit.
ai.local.llama.max-tokens=256
# balanced profile → effectiveContextWindow capped at min(16384, 8192) = 8192 (same as config).
# Avoids accidental 32k context blowup from runtime-profile=max default.
ai.local.llama.runtime-profile=conservative
# Explicitly set threads = number of physical cores (prevents auto-detect edge cases)
ai.local.llama.threads=2
ai.local.llama.preload-on-startup=false

# ── Redis: right-size pool for 2-core server (no need for 50 connections) ────
spring.redis.lettuce.pool.max-active=16
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=2

# ── Pre-analysis token budget: reduce CPU cost per classify call ──────────────
ai.local.pre-analysis.max-prompt-chars=60000
ai.local.pre-analysis.adaptive.deep-max-prompt-chars=60000
ai.local.pre-analysis.adaptive.deep-input-token-hard-cap=1200
ai.local.fast-question.max-tokens=256
ai.local.pre-analysis.enabled=false

# Step-1 local intent classify: bias toward faster routing while keeping adaptive safeguards.
ai.local.intent-classify.cache-ttl-ms=45000
ai.local.intent-classify.adaptive-cache-ttl-ms=1800000
ai.local.intent-classify.adaptive-cache-min-confidence=84
ai.local.intent-classify.confidence-threshold=58
ai.local.intent-classify.second-pass.enabled=true
ai.local.intent-classify.second-pass.min-request-chars=120
ai.local.intent-classify.token.min=32
ai.local.intent-classify.token.max=72
ai.local.intent-classify.token.first-pass.base=34
ai.local.intent-classify.token.second-pass.base=52
ai.local.intent-classify.token.length-step-chars=200
ai.local.intent-classify.token.length-step-increase=6
ai.local.intent-classify.token.complexity-step-increase=2
ai.local.intent-classify.token.complexity-max-bonus=14

ai.code-stream.routing.force-simple-first=true
ai.code-stream.routing.simple-first-max-chars=60000
ai.code-stream.routing.retry-default-max-prompt-chars=80000
ai.code-stream.local-provider.enabled=false
ai.code-stream.local-provider.analyze-only=false
ai.code-stream.local-provider.max-prompt-chars=60000
ai.code-stream.local-provider.allow-menu-json=true

ai.router.score-v2.local-only-threshold=40
ai.router.score-v2.hybrid-threshold=45
ai.router.score-v2.menu-json-cloud=true
ai.router.score-v2.local-only-hard=false

ai.assistant.prompt-budget.menu.max-chars=140000
ai.assistant.prompt-budget.code.max-chars=90000
ai.assistant.prompt-budget.code-analyze.current-code-max-chars=22000
ai.assistant.prompt-budget.continuity.max-chars=30000
ai.assistant.prompt-budget.global.max-chars=60000

ai.assistant.menu.primary-probe.skip-when-over-ratio=1.4

ai.telemetry.dashboard.window-hours=24
ai.telemetry.alert.fallback-rate-threshold=0.35
ai.telemetry.alert.quick-probe-rate-threshold=0.30
ai.telemetry.alert.min-samples=12

ai.orchestration.routing.matrix.enabled=true
ai.orchestration.routing.matrix.planner-model=gemini-2.5-flash
ai.orchestration.routing.matrix.balanced-model=gemini-2.5-flash
ai.orchestration.routing.matrix.complex-model=gemini-2.5-pro
ai.orchestration.speculative.enabled=true
ai.orchestration.speculative.min-attachment-chars=16000
ai.orchestration.speculative.max-json-scan-chars=260000
