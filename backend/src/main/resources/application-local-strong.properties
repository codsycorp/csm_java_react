# Local Strong Profile (for developer machine with good CPU/RAM)
# Usage:
#   SPRING_PROFILES_ACTIVE=local,local-strong mvn spring-boot:run
# Goal: keep full local agentic flow, larger context, faster throughput.

# ---- Route policy: keep code/menu flows local-first and deterministic ----
ai.local.only.enabled=true
ai.local.llama.prefer-local-first=true
ai.code-stream.local-provider.enabled=true
ai.router.score-v2.local-only-hard=true
ai.router.score-v2.menu-json-cloud=false

# ---- Local llama.cpp tuned for stronger machine ----
ai.local.llama.model-path=./csm_datas/ai_local/model/qwen2.5-coder-1.5b-instruct-q8_0.gguf
ai.local.llama.seo-model-path=./csm_datas/ai_local/model/qwen2.5-coder-1.5b-instruct-q8_0.gguf
ai.local.llama.swap-models-on-lane-change=false
ai.local.llama.runtime-profile=max
ai.local.llama.threads=6
ai.local.llama.batch-size=256
ai.local.llama.ubatch-size=128
ai.local.llama.context-window=8192
ai.local.llama.max-tokens=768
ai.local.llama.max-prompt-chars=320000
ai.local.llama.max-concurrent-requests=2
ai.local.llama.acquire-timeout-ms=4000
ai.local.llama.preload-on-startup=true
ai.local.llama.force-single-thread-on-weak=false

# ---- Prompt budgets for code/menu assistant ----
ai.code-stream.max-prompt-chars=220000
ai.code-stream.menu.max-prompt-chars=280000
ai.code-stream.local-provider.max-prompt-chars=120000
ai.code-stream.routing.retry-default-max-prompt-chars=140000
ai.code-stream.max-current-code-chars=140000
ai.code-stream.max-attachment-chars-per-file=50000

ai.assistant.prompt-budget.code.max-chars=140000
ai.assistant.prompt-budget.code-analyze.current-code-max-chars=50000
ai.assistant.prompt-budget.continuity.max-chars=50000
ai.assistant.prompt-budget.global.max-chars=120000

# ---- Agentic orchestration (local reasoning + Lucene vector) ----
ai.orchestration.agentic.enabled=true
ai.orchestration.agentic.max-context-chars=26000
ai.orchestration.agentic.max-code-symbols=80
ai.orchestration.agentic.max-attachment-items=12
ai.orchestration.agentic.max-intents=18

ai.orchestration.fast-unrelated.enabled=true
ai.orchestration.fast-unrelated.confidence-threshold=0.85

ai.orchestration.speculative.enabled=true
ai.orchestration.speculative.min-attachment-chars=12000
ai.orchestration.speculative.max-json-scan-chars=500000

ai.orchestration.multimodal.scope-rag.enabled=true
ai.orchestration.multimodal.scope-rag.top-k=10
ai.orchestration.multimodal.scope-rag.max-chars=10000
ai.orchestration.multimodal.dynamic-ingest.async.enabled=true
ai.orchestration.multimodal.local-only=true
ai.orchestration.multimodal.local-only.require-vision=false

# ---- Keep map-reduce broad analysis available on strong machine ----
ai.code-stream.analyze.sliding-window.enabled=true
ai.code-stream.analyze.sliding-window.threshold-chars=160000
ai.code-stream.analyze.sliding-window.max-windows=10
ai.code-stream.analyze.sliding-window.window-chars=3200
ai.code-stream.analyze.sliding-window.step-chars=24000

# ---- Runtime noise / background work ----
cache.warming.enabled=false

# ---- Thread pools ----
spring.task.scheduling.pool.size=2
spring.task.execution.pool.core-size=8
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=200

# ---- SSE timeout for long local inference ----
ai.code-stream.sse-timeout-ms=0
ai.code-stream.sse-timeout.adaptive.enabled=true
ai.code-stream.sse-timeout.adaptive.weak-server-force-infinite=false

# ---- Large-file edit pipeline (DynamicCode 371k+ — same gates as local-5gb) ----
ai.edit.local.symbol-micro-first.enabled=true
ai.edit.lifecycle-deterministic-fallback.enabled=true
ai.edit.header-zone-protect-min-line=100
ai.edit.surgical-max-line-span=40
ai.edit.task-planner.multi-slice-execution.enabled=true
ai.context.ingestion.large-code.enabled=true
ai.context.ingestion.large-code.threshold-chars=45000
ai.local.orchestration.large-code-region-plan.max-chars=22000
