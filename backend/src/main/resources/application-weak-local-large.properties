# Weak Local Large Profile: weak machine mode with larger context/output
# Loaded AFTER application-weak-local.properties when spring.profiles.active includes "weak-local,weak-local-large"
# Use when: Need more output (384 tokens) but still on 2-core/6GB weak machine
# Launch with: AI_LOCAL_MODE=large ./start.sh

# Override weak-local defaults for larger output capacity
ai.local.llama.context-window=3072
ai.local.llama.max-tokens=384
ai.local.llama.max-prompt-chars=80000

# Increase orchestration context budgets for larger code analysis
ai.orchestration.agentic.max-context-chars=12000
ai.orchestration.agentic.max-code-symbols=30

# Allow slightly more RAG retrieval for larger context
ai.orchestration.multimodal.scope-rag.top-k=4
ai.orchestration.multimodal.scope-rag.max-chars=3000

# Increase dynamic memory sources since more context is available
ai.orchestration.multimodal.dynamic-ingest.max-sources=32

# Batch size tuning: can keep at 32 (from start.sh), or adjust if needed
# Note: start.sh sets this to 32 for weak-local-large too; only override if perf is bad
# ai.local.llama.batch-size=32

# Slightly higher max concurrent requests for large mode (still conservative)
ai.local.llama.max-concurrent-requests=1

# Keep other weak-machine protections:
ai.local.llama.load-shed.enabled=true
ai.local.llama.inter-request-cooldown-ms=1800
ai.local.llama.preload-on-startup=false
