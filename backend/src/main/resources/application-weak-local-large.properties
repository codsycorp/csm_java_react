# Weak server large-payload mode (local-only).
# This profile is intended for heavy requests with large input/output.
# Use together with weak-local, not standalone:
#   SPRING_PROFILES_ACTIVE=prod,weak-local,weak-local-large
#
# Trade-off: significantly higher latency than weak-local fast mode.

# -----------------------------------------------------------------------------
# Keep strict local-only behavior
# -----------------------------------------------------------------------------
ai.local.force-all-flows=true
ai.local.menu.force-local-only=true
ai.router.score-v2.local-only-hard=true
ai.router.score-v2.menu-json-cloud=false
ai.assistant.menu.disable-gemini-fallback=true

# -----------------------------------------------------------------------------
# llama.cpp: raise caps for longer outputs/context (still weak-server safe)
# -----------------------------------------------------------------------------
ai.local.llama.runtime-profile=balanced
ai.local.llama.context-window=8192
ai.local.llama.max-tokens=1024
ai.local.llama.max-prompt-chars=240000
ai.local.llama.threads=2
ai.local.llama.batch-size=128
ai.local.llama.ubatch-size=64
ai.local.llama.temperature=0.1
ai.local.llama.top-p=0.85
ai.local.llama.top-k=32

# Per-flow output caps (high, but not infinite)
ai.local.direct.output.max-tokens=1536
ai.local.direct.output.menu-edit-max-tokens=2048
ai.local.direct.output.analyze-max-tokens=1536
ai.local.direct.output.question-max-tokens=768

# -----------------------------------------------------------------------------
# Large prompt/context budgets
# -----------------------------------------------------------------------------
ai.code-stream.max-prompt-chars=180000
ai.code-stream.menu.max-prompt-chars=260000
ai.code-stream.max-current-code-chars=90000
ai.code-stream.max-attachment-chars-per-file=30000
ai.code-stream.max-attachments-total-chars=120000

ai.assistant.prompt-budget.menu.max-chars=220000
ai.assistant.prompt-budget.code.max-chars=140000
ai.assistant.prompt-budget.code-analyze.current-code-max-chars=60000
ai.assistant.prompt-budget.continuity.max-chars=80000
ai.assistant.prompt-budget.global.max-chars=160000

# -----------------------------------------------------------------------------
# Enable multi-step continuation for near-unbounded output
# -----------------------------------------------------------------------------
ai.code-stream.auto-continue.enabled=true
ai.code-stream.auto-continue.max-attempts=12
ai.code-stream.auto-continue.max-previous-response-chars=300000

ai.menu.auto-continue.enabled=true
ai.menu.auto-continue.max-attempts=10
ai.menu.auto-continue.prompt-threshold-chars=120000
ai.menu.auto-continue.max-previous-output-chars=300000

ai.assistant.menu.chaining-enabled=true
ai.assistant.menu.chaining-threshold-chars=180000
ai.assistant.code.chaining-enabled=true
ai.assistant.code.chaining-threshold-chars=180000
ai.assistant.chaining.max-step-output-chars=120000

# -----------------------------------------------------------------------------
# Re-enable pre-analysis for better decomposition of huge requests
# -----------------------------------------------------------------------------
ai.local.pre-analysis.enabled=true
ai.local.pre-analysis.max-prompt-chars=140000
ai.local.pre-analysis.adaptive.enabled=true
ai.local.pre-analysis.adaptive.deep-max-prompt-chars=160000
ai.local.pre-analysis.adaptive.deep-input-token-hard-cap=2000

# -----------------------------------------------------------------------------
# Heavier map-reduce for large menu/code payloads (single worker on weak node)
# -----------------------------------------------------------------------------
ai.local.map-reduce.enabled-for-menu-json=true
ai.local.map-reduce.menu-threshold-chars=50000
ai.local.map-reduce.code-threshold-chars=100000
ai.local.map-reduce.chunk-chars=14000
ai.local.map-reduce.overlap-chars=800
ai.local.map-reduce.max-chunks=24
ai.local.map-reduce.parallel-enabled=false
ai.local.map-reduce.parallelism=1
ai.local.map-reduce.parallelism.weak-server-max=1

# -----------------------------------------------------------------------------
# Broader local retrieval context for large tasks
# -----------------------------------------------------------------------------
ai.local.assistant.max-file-chars=400000
ai.local.assistant.max-hits=6
ai.local.assistant.max-retrieval-chars=24000
ai.local.assistant.menu.max-hits=12
ai.local.assistant.menu.max-retrieval-chars=90000
ai.local.assistant.max-analysis-chars=240000
ai.local.assistant.index-refresh-ms=600000

# Keep SSE open longer for long multi-step responses
ai.code-stream.sse-timeout-ms=1800000
