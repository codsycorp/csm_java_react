# Staging profile: balanced cost/quality before production rollout

spring.profiles.include=performance

gemini.model=gemini-2.5-flash
gemini.streaming.max-tokens=20000
gemini.streaming.temperature=0.22
gemini.streaming.request-timeout-ms=0
ai.code-stream.sse-timeout-ms=0

ai.code-stream.routing.force-simple-first=true
ai.code-stream.routing.simple-first-max-chars=70000
ai.code-stream.routing.retry-default-max-prompt-chars=95000

ai.assistant.prompt-budget.menu.max-chars=155000
ai.assistant.prompt-budget.code.max-chars=100000
ai.assistant.prompt-budget.code-analyze.current-code-max-chars=26000
ai.assistant.prompt-budget.continuity.max-chars=34000
ai.assistant.prompt-budget.global.max-chars=68000

ai.assistant.menu.primary-probe.skip-when-over-ratio=1.5

ai.telemetry.dashboard.window-hours=24
ai.telemetry.alert.fallback-rate-threshold=0.35
ai.telemetry.alert.quick-probe-rate-threshold=0.30
ai.telemetry.alert.min-samples=10

ai.orchestration.routing.matrix.enabled=true
ai.orchestration.routing.matrix.planner-model=gemini-2.5-flash
ai.orchestration.routing.matrix.balanced-model=gemini-2.5-flash
ai.orchestration.routing.matrix.complex-model=gemini-2.5-pro
ai.orchestration.speculative.enabled=true
ai.orchestration.speculative.min-attachment-chars=14000
ai.orchestration.speculative.max-json-scan-chars=320000
