# MacBook Pro M1 16GB — Lane 5 render + storyboard + ONNX rembg
ai.local.runtime.tier=balanced
ai.local.llama.threads=4
ai.local.llama.max-concurrent-requests=1
ai.local.llama.context-window=12288
ai.local.llama.max-tokens=768
ai.local.llama.model-path=./csm_datas/ai_local/model/qwen2.5-coder-3b-instruct-q4_k_m.gguf
ai.local.llama.seo-model-path=./csm_datas/ai_local/model/qwen2.5-3b-instruct-q4_k_m.gguf
ai.local.llama.swap-models-on-lane-change=true
ai.seo.article.max-tokens=2048
ai.seo.article.target-words-vi=400-600

ai.media.render.enabled=true
ai.media.render.default-engine=talking_presenter
ai.media.tts.enabled=true
ai.media.talking-head.enabled=true
ai.media.render.max-duration-sec=30
ai.media.storyboard.enabled=true
ai.media.storyboard.max-scenes=5
ai.media.character.enabled=true
ai.media.character.model-auto-download=true
ai.media.martial.enabled=true

ai.orchestration.multimodal.vision.enabled=${AI_ORCHESTRATION_MULTIMODAL_VISION_ENABLED:true}
