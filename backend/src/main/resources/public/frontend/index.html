<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
	<!-- 🚀 PERFORMANCE: DNS Prefetch & Preconnect -->
	<link rel="dns-prefetch" href="//fonts.googleapis.com" />
	<link rel="dns-prefetch" href="//www.googletagmanager.com" />
	<link rel="preconnect" href="//fonts.googleapis.com" crossorigin />
	<link rel="preconnect" href="//fonts.gstatic.com" crossorigin />
	
	<!-- Base URL: giữ nguyên protocol từ meta.site_name thay vì ép sang https -->
	<base th:href="${meta.site_name}" />
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
	<meta name="theme-color" content="#000000" />
	<meta name="referrer" content="no-referrer-when-downgrade" />
	<meta name="robots" content="index,follow" />
	<meta http-equiv="audience" content="general" />
	<meta name="distribution" content="Global" />
	<meta name="revisit-after" content="1 days" />
	<meta name="google-site-verification" th:content="${meta.gsv!=null ? meta.gsv : ''}" />
	
	<!-- 🚀 PERFORMANCE: Resource Hints auto-injected by vite-plugin-resource-hints.js -->
	
	<!-- Clean tracking params AFTER GA tracking completes, then reload -->
	<script>
	(function(){
	  if (typeof window === 'undefined') return;
	  var params = new URLSearchParams(window.location.search);
	  var tracking = ['fbclid','gclid','mclid','utm_source','utm_medium','utm_campaign','utm_content','utm_term',
	    'zalopay','zaloref','fbref','igshid','tiktok_id','kwai_id','vc_ref','cvid','cvid_source'];
	  var needsCleanup = tracking.some(function(p){ return params.has(p); });
	  
	  if (needsCleanup) {
	    // Mark that we need to cleanup and reload
	    window.__needsUrlCleanup = true;
	    window.__cleanupParams = tracking;
	  }
	})();
	</script>
	
	<!-- Dynamic SEO Title with fallback -->
	<title
		th:text="${(meta!=null && meta.title2!=null) ? meta.title2 : (meta!=null && meta.title!=null ? meta.title : meta.f_title)}">
		CSM Site</title>
	<link rel="canonical" th:href="${meta.url}" />
	<meta name="description" th:content="${meta.description!=null ? meta.description : meta.f_keyword}" />
	<meta name="keywords" th:content="${meta.keywords!=null ? meta.keywords : meta.f_keyword}" />
	
	<!-- 🔥 RSS Feed for Google indexing -->
	<link rel="alternate" type="application/rss+xml" title="Latest Updates" href="/feed.xml" />

	<!-- Open Graph -->
	<meta property="og:url" th:content="${meta.url}" />
	<meta property="og:site_name" th:content="${meta.site_name}" />
	<meta property="og:locale" content="vi_VN" />
	<meta property="og:type" content="article" />
	<meta property="og:title"
		th:content="${meta.title2!=null ? meta.title2 : (meta.title!=null ? meta.title : meta.f_title)}" />
	<meta property="og:description" th:content="${meta.description!=null ? meta.description : meta.f_keyword}" />
	<meta property="og:image" th:content="${meta.image!=null ? meta.image : meta.f_logo}" />
	<meta property="og:image:alt"
		th:content="${meta.title2!=null ? meta.title2 : (meta.title!=null ? meta.title : meta.f_title)}" />

	<!-- Twitter -->
	<meta name="twitter:card" th:content="${meta.image != null ? 'summary_large_image' : 'summary'}" />
	<meta name="twitter:title"
		th:content="${meta.title2!=null ? meta.title2 : (meta.title!=null ? meta.title : meta.f_title)}" />
	<meta name="twitter:description" th:content="${meta.description!=null ? meta.description : meta.f_keyword}" />
	<meta name="twitter:image" th:content="${meta.image!=null ? meta.image : meta.f_logo}" />

	<!-- Icons -->
	<link rel="icon" th:href="${meta.f_logo}" />
	<link rel="apple-touch-icon" sizes="180x180" th:href="${meta.f_logo}" />

	<!-- App manifest -->
	<link rel="manifest" href="./manifest.json" />

	<!-- Permissions Policy to suppress sensor warnings -->
	<meta http-equiv="Permissions-Policy"
		content="accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), cross-origin-isolated=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" />

	<!-- Structured Data (schema.org) -->
	<script type="application/ld+json" th:inline="javascript">
		{
			"@context": "https://schema.org",
			"@type": "WebPage",
			"headline": [[${(meta!=null && meta.title2!=null)?meta.title2:(meta!=null && meta.title!=null?meta.title:meta.f_title)}]],
			"url": [[${meta.url}]],
			"description": [[${meta.description!=null?meta.description:meta.f_keyword}]],
			"inLanguage": "vi",
			"image": {
				"@type": "ImageObject",
				"url": [[${meta.image!=null?meta.image:meta.f_logo}]],
				"height": "1000",
				"width": "1920"
			},
			"publisher": {
				"@type": "Organization",
				"name": [[${meta.site_name}]],
				"url": [[${meta.site_name}]],
				"logo": {
					"@type": "ImageObject",
					"url": [[${meta.f_logo}]],
					"width": "506",
					"height": "132"
				}
			}
		}
	</script>
	<script async th:src="'https://www.googletagmanager.com/gtag/js?id=' + ${meta.gtag}"></script>
	<script th:inline="javascript">
		window.dataLayer = window.dataLayer || [];
		var client_id;
		function gtag() { dataLayer.push(arguments); }
		gtag('get', /*[[${meta.gtag}]]*/ '', 'client_id', function(id) {
			client_id = id;
		});
		gtag('js', new Date());
		gtag('config', /*[[${meta.gtag}]]*/ '');
		
		// Wait for GA to send pageview, then cleanup and reload if needed
		if (window.__needsUrlCleanup) {
			gtag('event', 'page_view', {
				'event_callback': function() {
					// GA tracking sent successfully, now safe to reload with clean URL
					var params = new URLSearchParams(window.location.search);
					var changed = false;
					window.__cleanupParams.forEach(function(p){ 
						if (params.has(p)) { params.delete(p); changed = true; }
					});
					if (changed) {
						var newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '') + window.location.hash;
						window.location.replace(newUrl);
					}
				},
				'event_timeout': 2000  // Fallback: reload after 2s even if callback doesn't fire
			});
			// Safety fallback in case event_callback doesn't work
			setTimeout(function() {
				if (window.__needsUrlCleanup) {
					var params = new URLSearchParams(window.location.search);
					var changed = false;
					window.__cleanupParams.forEach(function(p){ 
						if (params.has(p)) { params.delete(p); changed = true; }
					});
					if (changed) {
						var newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '') + window.location.hash;
						window.location.replace(newUrl);
					}
				}
			}, 2000);
		}
	</script>
	<!-- ✅ SEO Meta tags rendered by SERVER (not React) -->
	<!-- This prevents duplicate title/meta tags -->

	<!-- Pass data to React app (but don't let React touch meta tags) -->
	<script th:inline="javascript">
		// Server-rendered meta data for React app to use (but NOT to modify DOM)
		window.meta = /*[[${meta}]]*/ {};
		window.__INITIAL_DATA__ = /*[[${__INITIAL_DATA__}]]*/ {};
		window.menus = /*[[${menus}]]*/[];
	</script>
  <script type="module" crossorigin src="./assets/index.DVv5eHZw.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/ui-core.BqmAgYBd.js">
  <link rel="stylesheet" crossorigin href="./assets/ui-core.D32Un0ak.css">
  <link rel="stylesheet" crossorigin href="./assets/index.C-iBpIAf.css">
<script>window.addEventListener('vite:preloadError',(e)=>{console.warn('[CSS Preload Fix] Failed to preload CSS, continuing anyway:',e.payload?.message);e.preventDefault?.()},true);</script>

    <link rel="modulepreload" href="/assets/ui-core.BqmAgYBd.js" as="script" crossorigin />
  </head>

<body id="home" th:name="${meta.id}" th:attr="data-app-id=${meta.app_id}">
	<noscript>You need to enable JavaScript to run this app.</noscript>

	<!-- React mount point -->
	<div id="root"></div>

	<!-- React app entry point -->
	
	<!-- Load DocxtemplaterHtmlModule for report generation - deferred to not block rendering -->
	<script defer src="/frontend/assets/html-module.min.js"></script>
</body>

</html>
